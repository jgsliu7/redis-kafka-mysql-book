<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 500" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
  </defs>

  <text x="440" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">图 2-3 三家通信协议对比</text>

  <!-- Redis RESP -->
  <rect x="20" y="50" width="270" height="60" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="155" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#4F46E5">Redis RESP</text>
  <text x="155" y="97" text-anchor="middle" font-size="11" fill="#374151">文本协议 · 5 种前缀字符</text>

  <rect x="20" y="120" width="270" height="150" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="155" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">请求示例：SET key val</text>
  <rect x="40" y="158" width="230" height="32" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="0.8"/>
  <text x="155" y="179" text-anchor="middle" font-size="12" font-family="monospace" fill="#1E40AF">*3\r\n$3\r\nSET\r\n$3\r\nkey\r\n$3\r\nval\r\n</text>
  <text x="155" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">响应示例：OK</text>
  <rect x="40" y="220" width="230" height="32" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="0.8"/>
  <text x="155" y="241" text-anchor="middle" font-size="12" font-family="monospace" fill="#1E40AF">+OK\r\n</text>

  <rect x="30" y="285" width="250" height="20" rx="3" fill="#ECFDF5"/>
  <text x="155" y="300" text-anchor="middle" font-size="11" fill="#065F46">人眼可读 · nc 连上直接交互</text>

  <!-- MySQL Binary -->
  <rect x="305" y="50" width="270" height="60" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="440" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">MySQL Binary</text>
  <text x="440" y="97" text-anchor="middle" font-size="11" fill="#374151">紧凑二进制 · 预编译 · 类型安全</text>

  <rect x="305" y="120" width="270" height="150" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="440" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">预编译流程</text>
  <rect x="325" y="158" width="230" height="28" rx="4" fill="#FEF3C7" stroke="#FCD34D" stroke-width="0.8"/>
  <text x="440" y="178" text-anchor="middle" font-size="11" font-family="monospace" fill="#92400E">PREPARE → stmt_id</text>
  <rect x="325" y="192" width="230" height="28" rx="4" fill="#FEF3C7" stroke="#FCD34D" stroke-width="0.8"/>
  <text x="440" y="212" text-anchor="middle" font-size="11" font-family="monospace" fill="#92400E">EXECUTE(id + params)</text>
  <rect x="325" y="226" width="230" height="28" rx="4" fill="#FEF3C7" stroke="#FCD34D" stroke-width="0.8"/>
  <text x="440" y="246" text-anchor="middle" font-size="11" font-family="monospace" fill="#92400E">二进制列式结果集</text>

  <rect x="315" y="285" width="250" height="20" rx="3" fill="#ECFDF5"/>
  <text x="440" y="300" text-anchor="middle" font-size="11" fill="#065F46">紧凑高效 · 人不可读 · 带宽压降</text>

  <!-- Kafka Request/Response -->
  <rect x="590" y="50" width="270" height="60" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="725" y="76" text-anchor="middle" font-size="15" font-weight="700" fill="#065F46">Kafka Request/Response</text>
  <text x="725" y="97" text-anchor="middle" font-size="11" fill="#374151">统一头部 · 版本化 · 批量优先</text>

  <rect x="590" y="120" width="270" height="150" rx="6" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="725" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">请求头（4 字段）</text>
  <rect x="610" y="158" width="230" height="28" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="0.8"/>
  <text x="725" y="178" text-anchor="middle" font-size="11" font-family="monospace" fill="#065F46">api_key=0 api_version=9</text>
  <rect x="610" y="192" width="230" height="28" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="0.8"/>
  <text x="725" y="212" text-anchor="middle" font-size="11" font-family="monospace" fill="#065F46">correlation_id=42</text>
  <rect x="610" y="226" width="230" height="28" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="0.8"/>
  <text x="725" y="246" text-anchor="middle" font-size="11" font-family="monospace" fill="#065F46">+ Request Body (RecordBatch)</text>

  <rect x="600" y="285" width="250" height="20" rx="3" fill="#ECFDF5"/>
  <text x="725" y="300" text-anchor="middle" font-size="11" fill="#065F46">独立演进 · Batch 为传输单位</text>

  <!-- Bottom comparison grid -->
  <rect x="20" y="330" width="840" height="150" rx="8" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="440" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">核心差异一览</text>

  <text x="60" y="385" font-size="11" font-weight="600" fill="#4F46E5">维度</text>
  <text x="200" y="385" font-size="11" font-weight="600" fill="#4F46E5">Redis RESP</text>
  <text x="420" y="385" font-size="11" font-weight="600" fill="#92400E">MySQL Binary</text>
  <text x="650" y="385" font-size="11" font-weight="600" fill="#065F46">Kafka Request/Response</text>

  <text x="60" y="408" font-size="11" fill="#374151">编码</text>
  <text x="200" y="408" font-size="11" fill="#374151">纯文本行</text>
  <text x="420" y="408" font-size="11" fill="#374151">紧凑二进制（整数+长度前缀）</text>
  <text x="650" y="408" font-size="11" fill="#374151">二进制请求头 + 变长体</text>

  <text x="60" y="430" font-size="11" fill="#374151">批量</text>
  <text x="200" y="430" font-size="11" fill="#374151">Pipeline（多条独立）</text>
  <text x="420" y="430" font-size="11" fill="#374151">预编译语句（解析复用）</text>
  <text x="650" y="430" font-size="11" fill="#374151">RecordBatch（单包批量）</text>

  <text x="60" y="452" font-size="11" fill="#374151">演进</text>
  <text x="200" y="452" font-size="11" fill="#374151">手工约定</text>
  <text x="420" y="452" font-size="11" fill="#374151">能力标志位（握手交换）</text>
  <text x="650" y="452" font-size="11" fill="#374151">api_version（每种请求独立）</text>

  <text x="60" y="474" font-size="11" fill="#374151">人可读</text>
  <text x="200" y="474" font-size="11" fill="#065F46">✅</text>
  <text x="420" y="474" font-size="11" fill="#EF4444">❌</text>
  <text x="650" y="474" font-size="11" fill="#EF4444">❌</text>
</svg>
