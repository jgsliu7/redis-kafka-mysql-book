<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 470" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <text x="440" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">图 2-3 渐进式 rehash 的双表搬迁过程</text>
  <text x="440" y="52" text-anchor="middle" font-size="12.5" fill="#6B7280">某次操作触发搬迁进行中的快照：rehashidx 指向当前要搬的桶</text>

  <!-- ============ ht[0] 旧表（左）============ -->
  <text x="150" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#4F46E5">ht[0]　旧表（size=4）</text>

  <!-- 4 个桶，y=100 起，每桶高 56 -->
  <!-- 桶0 已搬空 -->
  <rect x="70" y="100" width="160" height="52" rx="5" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.3"/>
  <text x="52" y="130" text-anchor="end" font-size="12" fill="#6B7280">桶0</text>
  <text x="150" y="131" text-anchor="middle" font-size="12" fill="#9CA3AF">已搬空</text>
  <!-- 桶1 已搬空 -->
  <rect x="70" y="160" width="160" height="52" rx="5" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.3"/>
  <text x="52" y="190" text-anchor="end" font-size="12" fill="#6B7280">桶1</text>
  <text x="150" y="191" text-anchor="middle" font-size="12" fill="#9CA3AF">已搬空</text>
  <!-- 桶2 正在搬 rehashidx -->
  <rect x="70" y="220" width="160" height="52" rx="5" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.8"/>
  <text x="52" y="250" text-anchor="end" font-size="12" font-weight="700" fill="#B91C1C">桶2</text>
  <text x="150" y="251" text-anchor="middle" font-size="12.5" font-family="ui-monospace, monospace" fill="#B91C1C">k7 → k3 → k9</text>
  <!-- 桶3 待搬 -->
  <rect x="70" y="280" width="160" height="52" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/>
  <text x="52" y="310" text-anchor="end" font-size="12" fill="#6B7280">桶3</text>
  <text x="150" y="311" text-anchor="middle" font-size="12.5" font-family="ui-monospace, monospace" fill="#4F46E5">k2 → k5</text>

  <!-- rehashidx 指针 -->
  <text x="150" y="360" text-anchor="middle" font-size="12.5" font-weight="700" fill="#EF4444">rehashidx = 2</text>
  <text x="150" y="378" text-anchor="middle" font-size="11" fill="#6B7280">本次只搬这一个桶，然后 +1</text>

  <!-- ============ 搬迁箭头（中）：从桶2右缘指向新表左列 ============ -->
  <line x1="234" y1="246" x2="486" y2="246" stroke="#EF4444" stroke-width="2.4" marker-end="url(#arrow-red)"/>
  <text x="360" y="238" text-anchor="middle" font-size="11.5" fill="#B91C1C">搬迁桶2的键到新表</text>

  <!-- ============ ht[1] 新表（右）============ -->
  <text x="590" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">ht[1]　新表（size=8，更大）</text>

  <!-- 8 个桶，两列，x=490/670，y=100 起每桶高 40 -->
  <!-- 左列 桶0-3 -->
  <rect x="490" y="100" width="160" height="36" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.3"/><text x="480" y="123" text-anchor="end" font-size="11" fill="#6B7280">0</text><text x="570" y="123" text-anchor="middle" font-size="11.5" font-family="ui-monospace, monospace" fill="#065F46">k1</text>
  <rect x="490" y="144" width="160" height="36" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.3"/><text x="480" y="167" text-anchor="end" font-size="11" fill="#6B7280">1</text><text x="570" y="167" text-anchor="middle" font-size="11.5" font-family="ui-monospace, monospace" fill="#065F46">k7</text>
  <rect x="490" y="188" width="160" height="36" rx="5" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.1"/><text x="480" y="211" text-anchor="end" font-size="11" fill="#6B7280">2</text>
  <rect x="490" y="232" width="160" height="36" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.3"/><text x="480" y="255" text-anchor="end" font-size="11" fill="#6B7280">3</text><text x="570" y="255" text-anchor="middle" font-size="11.5" font-family="ui-monospace, monospace" fill="#065F46">k3</text>
  <!-- 右列 桶4-7 -->
  <rect x="670" y="100" width="150" height="36" rx="5" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.1"/><text x="662" y="123" text-anchor="end" font-size="11" fill="#6B7280">4</text>
  <rect x="670" y="144" width="150" height="36" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.3"/><text x="662" y="167" text-anchor="end" font-size="11" fill="#6B7280">5</text><text x="745" y="167" text-anchor="middle" font-size="11.5" font-family="ui-monospace, monospace" fill="#065F46">k9</text>
  <rect x="670" y="188" width="150" height="36" rx="5" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.1"/><text x="662" y="211" text-anchor="end" font-size="11" fill="#6B7280">6</text>
  <rect x="670" y="232" width="150" height="36" rx="5" fill="#ECFDF5" stroke="#10B981" stroke-width="1.3"/><text x="662" y="255" text-anchor="middle" font-size="11" fill="#6B7280"> </text><text x="662" y="255" text-anchor="end" font-size="11" fill="#6B7280">7</text><text x="745" y="255" text-anchor="middle" font-size="11.5" font-family="ui-monospace, monospace" fill="#065F46">k…</text>

  <text x="655" y="300" text-anchor="middle" font-size="11.5" fill="#6B7280">新写入的键直接进 ht[1]</text>

  <!-- ============ 底部：读写路径规则 ============ -->
  <rect x="70" y="398" width="360" height="54" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/>
  <text x="250" y="420" text-anchor="middle" font-size="12.5" font-weight="700" fill="#4F46E5">搬迁期间的读写</text>
  <text x="250" y="440" text-anchor="middle" font-size="11.5" fill="#374151">查找/删除：先查 ht[0] 再查 ht[1]；新写入只进 ht[1]</text>

  <rect x="460" y="398" width="360" height="54" rx="6" fill="#ECFDF5" stroke="#10B981" stroke-width="1.3"/>
  <text x="640" y="420" text-anchor="middle" font-size="12.5" font-weight="700" fill="#065F46">搬完之后</text>
  <text x="640" y="440" text-anchor="middle" font-size="11.5" fill="#374151">rehashidx 走到底 → ht[1] 变 ht[0]，旧表释放</text>
</svg>
