<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7.5" markerHeight="7.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <text x="440" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">图 2-2 跳表的多层索引与查找路径</text>

  <!-- 层标签 -->
  <text x="42" y="124" font-size="12" fill="#6B7280">第 3 层</text>
  <text x="42" y="199" font-size="12" fill="#6B7280">第 2 层</text>
  <text x="42" y="274" font-size="12" fill="#6B7280">第 1 层</text>
  <text x="42" y="290" font-size="10" fill="#9CA3AF">完整链表</text>

  <!-- ===== 竖向 tower 连线（同一节点跨层，浅灰）===== -->
  <g stroke="#9CA3AF" stroke-width="1" stroke-dasharray="2 2">
    <line x1="100" y1="138" x2="100" y2="175"/><line x1="100" y1="213" x2="100" y2="250"/>
    <line x1="400" y1="138" x2="400" y2="175"/><line x1="400" y1="213" x2="400" y2="250"/>
    <line x1="600" y1="213" x2="600" y2="250"/>
    <line x1="700" y1="138" x2="700" y2="175"/><line x1="700" y1="213" x2="700" y2="250"/>
  </g>

  <!-- ===== 第 3 层横向链（灰）===== -->
  <line x1="127" y1="119" x2="371" y2="119" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="427" y1="119" x2="671" y2="119" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <!-- ===== 第 2 层横向链 ===== -->
  <line x1="127" y1="194" x2="371" y2="194" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="427" y1="194" x2="571" y2="194" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="627" y1="194" x2="671" y2="194" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <!-- ===== 第 1 层横向链（全节点）===== -->
  <line x1="127" y1="269" x2="171" y2="269" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="227" y1="269" x2="271" y2="269" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="327" y1="269" x2="371" y2="269" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="427" y1="269" x2="471" y2="269" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="527" y1="269" x2="571" y2="269" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <line x1="627" y1="269" x2="671" y2="269" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>

  <!-- ===== 节点框 ===== -->
  <!-- head 塔 -->
  <rect x="73" y="100" width="54" height="38" rx="5" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.3"/><text x="100" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">head</text>
  <rect x="73" y="175" width="54" height="38" rx="5" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.3"/><text x="100" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">head</text>
  <rect x="73" y="250" width="54" height="38" rx="5" fill="#E5E7EB" stroke="#6B7280" stroke-width="1.3"/><text x="100" y="274" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">head</text>
  <!-- 3 (L1) -->
  <rect x="173" y="250" width="54" height="38" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/><text x="200" y="274" text-anchor="middle" font-size="14" fill="#4F46E5">3</text>
  <!-- 6 (L1) -->
  <rect x="273" y="250" width="54" height="38" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/><text x="300" y="274" text-anchor="middle" font-size="14" fill="#4F46E5">6</text>
  <!-- 9 塔 (L3,L2,L1) -->
  <rect x="373" y="100" width="54" height="38" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/><text x="400" y="124" text-anchor="middle" font-size="14" fill="#4F46E5">9</text>
  <rect x="373" y="175" width="54" height="38" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/><text x="400" y="199" text-anchor="middle" font-size="14" fill="#4F46E5">9</text>
  <rect x="373" y="250" width="54" height="38" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/><text x="400" y="274" text-anchor="middle" font-size="14" fill="#4F46E5">9</text>
  <!-- 12 (L1) -->
  <rect x="473" y="250" width="54" height="38" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/><text x="500" y="274" text-anchor="middle" font-size="14" fill="#4F46E5">12</text>
  <!-- 17 塔 (L2,L1) — 目标 -->
  <rect x="573" y="175" width="54" height="38" rx="5" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.8"/><text x="600" y="199" text-anchor="middle" font-size="14" font-weight="700" fill="#B91C1C">17</text>
  <rect x="573" y="250" width="54" height="38" rx="5" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.8"/><text x="600" y="274" text-anchor="middle" font-size="14" font-weight="700" fill="#B91C1C">17</text>
  <!-- 25 塔 (L3,L2,L1) -->
  <rect x="673" y="100" width="54" height="38" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/><text x="700" y="124" text-anchor="middle" font-size="14" fill="#4F46E5">25</text>
  <rect x="673" y="175" width="54" height="38" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/><text x="700" y="199" text-anchor="middle" font-size="14" fill="#4F46E5">25</text>
  <rect x="673" y="250" width="54" height="38" rx="5" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.3"/><text x="700" y="274" text-anchor="middle" font-size="14" fill="#4F46E5">25</text>

  <!-- ===== 红色查找路径：查 17（下沉到底层再横移，符合 Redis 严格 < 比较）===== -->
  <!-- head-L3 → 9-L3 -->
  <line x1="127" y1="112" x2="373" y2="112" stroke="#EF4444" stroke-width="2.4" marker-end="url(#arrow-red)"/>
  <!-- 9-L3 下沉到 9-L2（L2 中 9 的下一个是 17，但 17 不小于目标，无法右移 → 继续下沉）-->
  <line x1="392" y1="138" x2="392" y2="175" stroke="#EF4444" stroke-width="2.4" marker-end="url(#arrow-red)"/>
  <!-- 9-L2 下沉到 9-L1 -->
  <line x1="392" y1="213" x2="392" y2="250" stroke="#EF4444" stroke-width="2.4" marker-end="url(#arrow-red)"/>
  <!-- 9-L1 → 12-L1 -->
  <line x1="427" y1="262" x2="473" y2="262" stroke="#EF4444" stroke-width="2.4" marker-end="url(#arrow-red)"/>
  <!-- 12-L1 → 17-L1（命中）-->
  <line x1="527" y1="262" x2="573" y2="262" stroke="#EF4444" stroke-width="2.4" marker-end="url(#arrow-red)"/>

  <!-- 图例 + 说明 -->
  <line x1="500" y1="330" x2="530" y2="330" stroke="#EF4444" stroke-width="2.4" marker-end="url(#arrow-red)"/>
  <text x="538" y="334" font-size="12" fill="#374151">查找 17：顶层快速逼近，下沉到底层后沿链表命中</text>

  <rect x="60" y="352" width="760" height="34" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.3"/>
  <text x="440" y="374" text-anchor="middle" font-size="12.5" fill="#92400E">上层是"快速通道"，一次跳过多个节点：查找 / 插入 / 删除平均 O(log N)，范围扫描沿底层链表前进即可</text>
</svg>
