<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
  </defs>

  <text x="440" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">图 2-1 Redis 五种底层数据结构的适用场景与升级路径</text>

  <!-- SDS -->
  <rect x="40" y="60" width="240" height="100" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="160" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#4F46E5">SDS 简单动态字符串</text>
  <text x="160" y="110" text-anchor="middle" font-size="11" fill="#374151">String 类型底层 · 二进制安全</text>
  <text x="160" y="128" text-anchor="middle" font-size="11" fill="#6B7280">O(1) 取长 · 预分配 · 惰性释放</text>
  <text x="160" y="148" text-anchor="middle" font-size="11" fill="#6B7280">所有 key 都是 SDS</text>

  <!-- Dict -->
  <rect x="320" y="60" width="240" height="100" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="440" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#4F46E5">字典（dict）</text>
  <text x="440" y="110" text-anchor="middle" font-size="11" fill="#374151">Hash 类型底层 · 整个键空间</text>
  <text x="440" y="128" text-anchor="middle" font-size="11" fill="#6B7280">链式哈希 · MurmurHash2</text>
  <text x="440" y="148" text-anchor="middle" font-size="11" fill="#6B7280">渐进式 rehash（摊还）</text>

  <!-- Skiplist -->
  <rect x="600" y="60" width="240" height="100" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="720" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#4F46E5">跳表（skiplist）</text>
  <text x="720" y="110" text-anchor="middle" font-size="11" fill="#374151">ZSet 底层（数据量大时）</text>
  <text x="720" y="128" text-anchor="middle" font-size="11" fill="#6B7280">多层有序链表 · O(log N)</text>
  <text x="720" y="148" text-anchor="middle" font-size="11" fill="#6B7280">比红黑树实现简单</text>

  <!-- Compact structures row -->
  <rect x="40" y="200" width="380" height="100" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="230" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">ziplist → listpack（紧凑列表）</text>
  <text x="230" y="250" text-anchor="middle" font-size="11" fill="#374151">List/Hash/ZSet 小数据底层编码</text>
  <text x="230" y="268" text-anchor="middle" font-size="11" fill="#6B7280">连续内存 · 无指针开销 · 极致省内存</text>
  <text x="230" y="286" text-anchor="middle" font-size="11" fill="#6B7280">listpack 每元素自记长度 → 消除连锁更新</text>

  <rect x="460" y="200" width="380" height="100" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="650" y="228" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">intset（整数集合）</text>
  <text x="650" y="250" text-anchor="middle" font-size="11" fill="#374151">Set 小数据 + 全整数底层编码</text>
  <text x="650" y="268" text-anchor="middle" font-size="11" fill="#6B7280">有序整数数组 · 二分查找</text>
  <text x="650" y="286" text-anchor="middle" font-size="11" fill="#6B7280">插入非整数 → 自动升级为 dict</text>

  <!-- Upgrade arrows -->
  <line x1="270" y1="300" x2="270" y2="340" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="610" y1="300" x2="610" y2="340" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Upgrade box -->
  <rect x="120" y="345" width="640" height="60" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="440" y="370" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">数据膨胀 → 自动编码升级（对上层命令透明）</text>
  <text x="440" y="392" text-anchor="middle" font-size="12" fill="#374151">listpack → hashtable（Hash）| listpack → skiplist（ZSet）| intset → dict（Set）</text>

  <!-- Key insight -->
  <rect x="40" y="430" width="800" height="70" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="440" y="455" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">核心洞察</text>
  <text x="440" y="475" text-anchor="middle" font-size="12" fill="#374151">Redis 给每种类型都准备了"小数据紧凑编码 + 大数据复杂结构"两套方案，无缝切换是内存效率的核心杠杆</text>
  <text x="440" y="493" text-anchor="middle" font-size="11" fill="#6B7280">统一目标：全内存 + 低延迟 → 数据结构要省内存、少 CPU、自动适配数据规模</text>
</svg>
