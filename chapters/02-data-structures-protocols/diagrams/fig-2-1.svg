<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 450" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
  </defs>

  <text x="440" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">图 2-1 SDS 与 C 字符串的内存布局对比</text>

  <!-- ============ 上半：C 字符串 ============ -->
  <text x="60" y="70" font-size="14" font-weight="700" fill="#374151">C 语言字符串（char*）</text>

  <!-- 6 个字节格 x=60 起，每格 46 宽 -->
  <rect x="60"  y="84" width="46" height="44" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <rect x="106" y="84" width="46" height="44" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <rect x="152" y="84" width="46" height="44" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <rect x="198" y="84" width="46" height="44" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <rect x="244" y="84" width="46" height="44" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <rect x="290" y="84" width="46" height="44" fill="#FEF3C7" stroke="#D97706" stroke-width="1.3"/>
  <text x="83"  y="112" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#111827">h</text>
  <text x="129" y="112" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#111827">e</text>
  <text x="175" y="112" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#111827">l</text>
  <text x="221" y="112" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#111827">l</text>
  <text x="267" y="112" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#111827">o</text>
  <text x="313" y="112" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#92400E">\0</text>

  <!-- 遍历箭头 -->
  <line x1="60" y1="144" x2="336" y2="144" stroke="#4B5563" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
  <text x="198" y="162" text-anchor="middle" font-size="11.5" fill="#6B7280">逐字节遍历到 \0 才知长度</text>

  <text x="380" y="102" font-size="12.5" fill="#374151">· 取长度：从头扫到 \0 → O(n)</text>
  <text x="380" y="126" font-size="12.5" fill="#374151">· \0 作终止符 → 无法存二进制数据</text>

  <!-- ============ 下半：SDS ============ -->
  <text x="60" y="222" font-size="14" font-weight="700" fill="#4F46E5">SDS（简单动态字符串）</text>

  <!-- 分区标签 -->
  <text x="186" y="250" text-anchor="middle" font-size="11.5" fill="#6B7280">header（头部，记录元信息）</text>
  <text x="450" y="250" text-anchor="middle" font-size="11.5" fill="#6B7280">buf（实际数据，紧跟头部之后）</text>

  <!-- header 三格 x=60 起，每格 84 宽 -->
  <rect x="60"  y="258" width="84" height="46" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/>
  <rect x="144" y="258" width="84" height="46" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/>
  <rect x="228" y="258" width="84" height="46" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.4"/>
  <text x="102" y="287" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#4F46E5">len=5</text>
  <text x="186" y="287" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#4F46E5">alloc=8</text>
  <text x="270" y="287" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#4F46E5">flags</text>

  <!-- buf 6 格 x=312 起，每格 46 宽 -->
  <rect x="312" y="258" width="46" height="46" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <rect x="358" y="258" width="46" height="46" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <rect x="404" y="258" width="46" height="46" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <rect x="450" y="258" width="46" height="46" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <rect x="496" y="258" width="46" height="46" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <rect x="542" y="258" width="46" height="46" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <text x="335" y="287" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#111827">h</text>
  <text x="381" y="287" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#111827">e</text>
  <text x="427" y="287" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#111827">l</text>
  <text x="473" y="287" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#111827">l</text>
  <text x="519" y="287" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#111827">o</text>
  <text x="565" y="287" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#6B7280">\0</text>

  <!-- len 指向说明 -->
  <line x1="102" y1="304" x2="102" y2="340" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arrow)"/>
  <text x="60" y="360" font-size="12.5" fill="#374151">读 len 字段直接得长度 → O(1)</text>

  <text x="380" y="332" font-size="12.5" fill="#374151">· buf 可存任意字节（含 \0）→ 二进制安全</text>
  <text x="380" y="356" font-size="12.5" fill="#374151">· alloc 记已分配空间 → 预分配 / 惰性释放</text>

  <!-- 底部一句话 -->
  <rect x="60" y="386" width="760" height="42" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.3"/>
  <text x="440" y="412" text-anchor="middle" font-size="12.5" fill="#92400E">用一个头部换来 O(1) 取长、二进制安全与更少的 realloc，内存里这点头部开销远比反复遍历划算</text>
</svg>
