<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
  </defs>

  <text x="400" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">图 7-1 MySQL 主从复制基础拓扑</text>
  <text x="400" y="48" text-anchor="middle" font-size="12" fill="#6B7280">主库写 binlog → 从库 IO 线程拉取到 relay log → SQL 线程回放</text>

  <!-- Master -->
  <rect x="250" y="75" width="300" height="110" rx="10" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#4F46E5">主库（Master）</text>
  <rect x="280" y="118" width="240" height="28" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="400" y="137" text-anchor="middle" font-size="12" fill="#1E40AF">写请求 → 事务提交 → 写 binlog</text>
  <rect x="280" y="152" width="240" height="24" rx="5" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="400" y="169" text-anchor="middle" font-size="12" fill="#1E40AF">binlog = 所有数据变更的有序日志</text>

  <!-- Arrow: Master binlog → Slave IO -->
  <line x1="400" y1="185" x2="400" y2="215" stroke="#4F46E5" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <text x="420" y="204" font-size="11" fill="#4F46E5">binlog 流</text>

  <!-- Slave -->
  <rect x="200" y="220" width="400" height="140" rx="10" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="400" y="250" text-anchor="middle" font-size="15" font-weight="700" fill="#92400E">从库（Slave）</text>

  <!-- IO Thread -->
  <rect x="220" y="265" width="170" height="40" rx="6" fill="#FEF3C7" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="305" y="283" text-anchor="middle" font-size="13" font-weight="600" fill="#92400E">IO 线程</text>
  <text x="305" y="300" text-anchor="middle" font-size="10" fill="#78716C">拉取 binlog → relay log</text>

  <!-- Arrow IO → relay log -->
  <line x1="390" y1="285" x2="420" y2="285" stroke="#92400E" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Relay Log -->
  <rect x="425" y="265" width="155" height="40" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="502" y="283" text-anchor="middle" font-size="13" font-weight="600" fill="#92400E">relay log</text>
  <text x="502" y="300" text-anchor="middle" font-size="10" fill="#78716C">中继日志（缓冲）</text>

  <!-- Arrow relay → SQL -->
  <line x1="502" y1="305" x2="502" y2="320" stroke="#92400E" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- SQL Thread -->
  <rect x="335" y="323" width="170" height="28" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.2"/>
  <text x="420" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#92400E">SQL 线程：逐条回放</text>

  <!-- Three concurrent slaves hint -->
  <text x="400" y="380" text-anchor="middle" font-size="11" fill="#9CA3AF">主库 → N 个从库（每个从库独立拉取，互不影响）</text>
</svg>
