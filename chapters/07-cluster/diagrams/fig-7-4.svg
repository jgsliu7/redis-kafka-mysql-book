<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
  </defs>

  <text x="400" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">图 7-4 Kafka 分区与副本拓扑</text>
  <text x="400" y="46" text-anchor="middle" font-size="12" fill="#6B7280">Topic 切为 Partition，每个 Partition 有 1 个 Leader + N 个 Follower，Leader 负责所有读写</text>

  <!-- Topic -->
  <rect x="250" y="65" width="300" height="36" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="400" y="88" text-anchor="middle" font-size="15" font-weight="700" fill="#4F46E5">Topic：user-events（3 分区，3 副本）</text>

  <!-- Partition 0 -->
  <rect x="30" y="125" width="740" height="80" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="60" y="152" font-size="14" font-weight="700" fill="#4F46E5">Partition 0</text>

  <rect x="140" y="135" width="180" height="58" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="230" y="158" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">Leader</text>
  <text x="230" y="178" text-anchor="middle" font-size="11" fill="#3B82F6">Broker 1 · 读写</text>

  <rect x="340" y="135" width="180" height="58" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="430" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#6B7280">Follower</text>
  <text x="430" y="178" text-anchor="middle" font-size="11" fill="#9CA3AF">Broker 2 · 同步追赶</text>

  <rect x="540" y="135" width="180" height="58" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="630" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#6B7280">Follower</text>
  <text x="630" y="178" text-anchor="middle" font-size="11" fill="#9CA3AF">Broker 3 · 同步追赶</text>

  <!-- ISR bracket for Partition 0 -->
  <rect x="130" y="208" width="600" height="24" rx="4" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="430" y="225" text-anchor="middle" font-size="11" fill="#065F46">ISR = {Broker 1 (L), Broker 2 (F), Broker 3 (F)}，三个副本都在同步窗口内</text>

  <!-- Partition 1 -->
  <rect x="30" y="245" width="740" height="80" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="60" y="272" font-size="14" font-weight="700" fill="#4F46E5">Partition 1</text>

  <rect x="140" y="255" width="180" height="58" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="230" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#6B7280">Follower</text>
  <text x="230" y="298" text-anchor="middle" font-size="11" fill="#9CA3AF">Broker 1 · 同步追赶</text>

  <rect x="340" y="255" width="180" height="58" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="430" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">Leader</text>
  <text x="430" y="298" text-anchor="middle" font-size="11" fill="#3B82F6">Broker 2 · 读写</text>

  <rect x="540" y="255" width="180" height="58" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="630" y="278" text-anchor="middle" font-size="13" font-weight="600" fill="#DC2626">Follower（滞后）</text>
  <text x="630" y="298" text-anchor="middle" font-size="11" fill="#EF4444">Broker 3 · 已踢出 ISR</text>

  <!-- ISR bracket for Partition 1 -->
  <rect x="130" y="328" width="600" height="24" rx="4" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="430" y="345" text-anchor="middle" font-size="11" fill="#DC2626">ISR = {Broker 2 (L), Broker 1 (F)}，Broker 3 落后超 30 秒，已踢出</text>

  <!-- Partition 2 -->
  <rect x="30" y="362" width="740" height="62" rx="8" fill="#F8FAFC" stroke="#E2E8F0" stroke-width="1.2"/>
  <text x="60" y="388" font-size="14" font-weight="700" fill="#4F46E5">Partition 2</text>

  <rect x="140" y="372" width="180" height="44" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="230" y="399" text-anchor="middle" font-size="13" font-weight="600" fill="#6B7280">Follower · Broker 1</text>

  <rect x="340" y="372" width="180" height="44" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1.2"/>
  <text x="430" y="399" text-anchor="middle" font-size="13" font-weight="600" fill="#6B7280">Follower · Broker 2</text>

  <rect x="540" y="372" width="180" height="44" rx="6" fill="#DBEAFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="630" y="399" text-anchor="middle" font-size="13" font-weight="700" fill="#1E40AF">Leader · Broker 3</text>
</svg>
