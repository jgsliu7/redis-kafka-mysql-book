<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 7-1　单点到集群的演进路径（三款软件并列）</text>
  <text x="460" y="52" text-anchor="middle" font-size="12" fill="#6B7280">每一栏从左到右是「不断还债」的过程：前一段留下什么痛点，后一段补上</text>

  <!-- Column headers -->
  <rect x="40"  y="70" width="270" height="34" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="175" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#4F46E5">Redis（偏 AP · 缓存优先）</text>

  <rect x="325" y="70" width="270" height="34" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="460" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#D97706">MySQL（CP · 不丢数据）</text>

  <rect x="610" y="70" width="270" height="34" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="745" y="92" text-anchor="middle" font-size="15" font-weight="700" fill="#059669">Kafka（可调 · 流管道）</text>

  <!-- ===== Redis column ===== -->
  <rect x="50" y="135" width="250" height="70" rx="6" fill="#EEF2FF" stroke="#4F46E5"/>
  <text x="175" y="160" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">① 主从复制</text>
  <text x="175" y="180" text-anchor="middle" font-size="12" fill="#374151">异步复制 · 写仍单主</text>
  <text x="175" y="196" text-anchor="middle" font-size="12" fill="#374151">解决：可用性（手动）</text>

  <line x1="175" y1="205" x2="175" y2="245" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="185" y="230" font-size="11" fill="#EF4444">故障转移需人工</text>

  <rect x="50" y="245" width="250" height="70" rx="6" fill="#EEF2FF" stroke="#4F46E5"/>
  <text x="175" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">② Sentinel 哨兵</text>
  <text x="175" y="290" text-anchor="middle" font-size="12" fill="#374151">SDOWN→ODOWN→Raft 选主</text>
  <text x="175" y="306" text-anchor="middle" font-size="12" fill="#374151">解决：自动故障转移</text>

  <line x1="175" y1="315" x2="175" y2="355" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="185" y="340" font-size="11" fill="#EF4444">仍不能水平扩写</text>

  <rect x="50" y="355" width="250" height="70" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="175" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">③ Redis Cluster</text>
  <text x="175" y="400" text-anchor="middle" font-size="12" fill="#374151">16384 槽分片 + Gossip</text>
  <text x="175" y="416" text-anchor="middle" font-size="12" fill="#374151">解决：扩展 + 自动容错</text>

  <text x="175" y="455" text-anchor="middle" font-size="12" font-style="italic" fill="#6B7280">CAP 立场：异步复制偏 AP，分区时少数派停写偏 CP（见 7.2.3）</text>

  <!-- ===== MySQL column ===== -->
  <rect x="335" y="135" width="250" height="70" rx="6" fill="#FEF3C7" stroke="#D97706"/>
  <text x="460" y="160" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">① 异步复制</text>
  <text x="460" y="180" text-anchor="middle" font-size="12" fill="#374151">binlog 推送 · 主不等从</text>
  <text x="460" y="196" text-anchor="middle" font-size="12" fill="#374151">问题：主挂可丢已提交事务</text>

  <line x1="460" y1="205" x2="460" y2="245" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="470" y="230" font-size="11" fill="#EF4444">主挂可丢数据</text>

  <rect x="335" y="245" width="250" height="70" rx="6" fill="#FEF3C7" stroke="#D97706"/>
  <text x="460" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">② 半同步复制</text>
  <text x="460" y="290" text-anchor="middle" font-size="12" fill="#374151">主等 ≥1 个从 ACK 才返回</text>
  <text x="460" y="306" text-anchor="middle" font-size="12" fill="#374151">解决：不丢（超时降级回异步）</text>

  <line x1="460" y1="315" x2="460" y2="355" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="470" y="340" font-size="11" fill="#EF4444">仍无共识 · 脑裂风险</text>

  <rect x="335" y="355" width="250" height="70" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="460" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">③ Group Replication (MGR)</text>
  <text x="460" y="400" text-anchor="middle" font-size="12" fill="#374151">Paxos 多数派确认 · 不分片</text>
  <text x="460" y="416" text-anchor="middle" font-size="12" fill="#374151">解决：强一致 + 自动 View Change</text>

  <text x="460" y="455" text-anchor="middle" font-size="12" font-style="italic" fill="#6B7280">CAP 立场：偏 CP（少数派分区停服）</text>

  <!-- ===== Kafka column ===== -->
  <rect x="620" y="135" width="250" height="70" rx="6" fill="#ECFDF5" stroke="#059669"/>
  <text x="745" y="160" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">① Partition 分片</text>
  <text x="745" y="180" text-anchor="middle" font-size="12" fill="#374151">Topic 切有序追加日志</text>
  <text x="745" y="196" text-anchor="middle" font-size="12" fill="#374151">解决：并行度与吞吐</text>

  <line x1="745" y1="205" x2="745" y2="245" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="755" y="230" font-size="11" fill="#EF4444">单分区无容错</text>

  <rect x="620" y="245" width="250" height="70" rx="6" fill="#ECFDF5" stroke="#059669"/>
  <text x="745" y="270" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">② Replica + ISR</text>
  <text x="745" y="290" text-anchor="middle" font-size="12" fill="#374151">Leader/Follower · 动态门槛</text>
  <text x="745" y="306" text-anchor="middle" font-size="12" fill="#374151">解决：可用 + 不丢（ISR 内选主）</text>

  <line x1="745" y1="315" x2="745" y2="355" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="755" y="340" font-size="11" fill="#EF4444">元数据外挂 ZK</text>

  <rect x="620" y="355" width="250" height="70" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="745" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">③ KRaft 元数据</text>
  <text x="745" y="400" text-anchor="middle" font-size="12" fill="#374151">内嵌 Raft · 单进程强一致</text>
  <text x="745" y="416" text-anchor="middle" font-size="12" fill="#374151">解决：百万分区 + 快速恢复</text>

  <text x="745" y="455" text-anchor="middle" font-size="12" font-style="italic" fill="#6B7280">CAP 立场：可调（acks=all 默认偏 CP，可下调）</text>

  <!-- Bottom legend -->
  <line x1="50" y1="495" x2="870" y2="495" stroke="#E5E7EB" stroke-width="1"/>
  <text x="460" y="520" text-anchor="middle" font-size="12" fill="#6B7280">
    三款软件演进步数相似，终点方案却落到 CAP 的不同象限，这是产品定位决定的设计起点
  </text>
  <text x="460" y="540" text-anchor="middle" font-size="11" fill="#9CA3AF">（红色文字为前一段留下的痛点，箭头方向为演进顺序）</text>
</svg>
