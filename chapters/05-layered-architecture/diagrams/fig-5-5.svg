<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr46" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arr46g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arr46r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 5-5　Kafka Reactor + RequestChannel 线程模型</text>
  <text x="440" y="54" text-anchor="middle" font-size="13" fill="#374151">网络线程与业务线程通过有界队列解耦，队列满时天然回压上游</text>

  <!-- 客户端们 -->
  <rect x="30" y="120" width="70" height="30" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2"/>
  <text x="65" y="139" text-anchor="middle" font-size="11" fill="#111827">生产者</text>
  <rect x="30" y="160" width="70" height="30" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2"/>
  <text x="65" y="179" text-anchor="middle" font-size="11" fill="#111827">消费者</text>
  <rect x="30" y="200" width="70" height="30" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2"/>
  <text x="65" y="219" text-anchor="middle" font-size="11" fill="#111827">Controller</text>
  <text x="65" y="252" text-anchor="middle" font-size="10" fill="#6B7280">多个 TCP</text>
  <text x="65" y="266" text-anchor="middle" font-size="10" fill="#6B7280">连接</text>

  <!-- Acceptor -->
  <rect x="140" y="140" width="120" height="76" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="200" y="166" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Acceptor</text>
  <text x="200" y="184" text-anchor="middle" font-size="11" fill="#374151">1 个线程</text>
  <text x="200" y="202" text-anchor="middle" font-size="11" fill="#374151">accept 新连接</text>

  <line x1="100" y1="175" x2="138" y2="175" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr46)"/>

  <!-- Processor（多线程网络 IO）-->
  <text x="360" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">Processor 线程组（N 个）</text>
  <rect x="300" y="132" width="120" height="44" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="360" y="152" text-anchor="middle" font-size="11" fill="#111827">Processor-1</text>
  <text x="360" y="168" text-anchor="middle" font-size="10" fill="#6B7280">协议编解码</text>
  <rect x="300" y="180" width="120" height="44" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="360" y="200" text-anchor="middle" font-size="11" fill="#111827">Processor-2</text>
  <rect x="300" y="228" width="120" height="28" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="360" y="246" text-anchor="middle" font-size="10" fill="#6B7280">…</text>

  <!-- Acceptor 分发到 Processor -->
  <line x1="260" y1="160" x2="298" y2="154" stroke="#059669" stroke-width="1.5" marker-end="url(#arr46g)"/>
  <line x1="260" y1="180" x2="298" y2="202" stroke="#059669" stroke-width="1.5" marker-end="url(#arr46g)"/>

  <!-- RequestChannel（有界队列）核心 -->
  <rect x="470" y="140" width="140" height="180" rx="8" fill="#FEF2F2" stroke="#EF4444" stroke-width="2"/>
  <text x="540" y="164" text-anchor="middle" font-size="13" font-weight="700" fill="#EF4444">RequestChannel</text>
  <text x="540" y="182" text-anchor="middle" font-size="11" fill="#374151">有界队列</text>

  <!-- 队列里的请求 -->
  <rect x="490" y="196" width="100" height="20" rx="3" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="1"/>
  <text x="540" y="210" text-anchor="middle" font-size="10" fill="#111827">req</text>
  <rect x="490" y="220" width="100" height="20" rx="3" fill="#FFFFFF" stroke="#FCA5A5" stroke-width="1"/>
  <text x="540" y="234" text-anchor="middle" font-size="10" fill="#111827">req</text>
  <rect x="490" y="244" width="100" height="20" rx="3" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="540" y="258" text-anchor="middle" font-size="10" fill="#EF4444" font-weight="600">req（满→回压）</text>
  <text x="540" y="292" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">背压点</text>
  <text x="540" y="306" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">满则阻塞网络线程</text>

  <!-- Processor → 队列 -->
  <line x1="420" y1="154" x2="468" y2="200" stroke="#059669" stroke-width="1.5" marker-end="url(#arr46g)"/>
  <line x1="420" y1="202" x2="468" y2="220" stroke="#059669" stroke-width="1.5" marker-end="url(#arr46g)"/>
  <text x="430" y="172" font-size="10" fill="#059669">入队</text>

  <!-- KafkaRequestHandler 业务线程 -->
  <text x="700" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">KafkaRequestHandler（M 个）</text>
  <rect x="640" y="132" width="130" height="44" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="705" y="152" text-anchor="middle" font-size="11" fill="#111827">业务线程-1</text>
  <text x="705" y="168" text-anchor="middle" font-size="10" fill="#6B7280">KafkaApis.handle()</text>
  <rect x="640" y="180" width="130" height="44" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="705" y="200" text-anchor="middle" font-size="11" fill="#111827">业务线程-2</text>
  <rect x="640" y="228" width="130" height="28" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="705" y="246" text-anchor="middle" font-size="10" fill="#6B7280">…</text>

  <!-- 队列 → 业务线程 -->
  <line x1="610" y1="200" x2="638" y2="154" stroke="#059669" stroke-width="1.5" marker-end="url(#arr46g)"/>
  <line x1="610" y1="220" x2="638" y2="202" stroke="#059669" stroke-width="1.5" marker-end="url(#arr46g)"/>
  <text x="616" y="172" font-size="10" fill="#059669">出队</text>

  <!-- 业务线程 → 下游 -->
  <rect x="640" y="320" width="200" height="60" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="740" y="344" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">Log / ReplicaManager</text>
  <text x="740" y="362" text-anchor="middle" font-size="11" fill="#374151">（存储层 / 协调层）</text>
  <line x1="705" y1="224" x2="705" y2="318" stroke="#4B5563" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arr46)"/>
  <text x="716" y="280" font-size="10" fill="#6B7280">对象方法调用</text>

  <!-- 响应回程 -->
  <line x1="705" y1="320" x2="540" y2="320" stroke="#EF4444" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr46r)"/>
  <text x="624" y="314" text-anchor="middle" font-size="10" fill="#EF4444">响应入 ResponseQueue</text>

  <!-- 标注交互层 / 逻辑层 -->
  <rect x="270" y="408" width="500" height="4" rx="2" fill="#059669" opacity="0.4"/>
  <text x="280" y="432" font-size="11" font-weight="600" fill="#059669">交互层（网络线程 + 队列）</text>
  <text x="280" y="450" font-size="10" fill="#6B7280">Acceptor / Processor / RequestChannel</text>
  <text x="520" y="432" font-size="11" font-weight="600" fill="#059669">逻辑层（业务线程）</text>
  <text x="520" y="450" font-size="10" fill="#6B7280">Handler：鉴权、配额、分派</text>

  <!-- 底部注释 -->
  <rect x="40" y="476" width="800" height="68" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="60" y="498" font-size="12" font-weight="600" fill="#111827">对照 Redis：Kafka 必须多线程，单机要扛多分区、多副本的并发 IO。</text>
  <text x="60" y="518" font-size="11" fill="#374151">交互层是三者里最「重」的（多层线程 + 队列），换来单机榨干多核与水平扩展。延迟比 Redis 高，但吞吐量级不同。</text>
  <text x="60" y="536" font-size="11" fill="#374151">有界队列是天然的流量调节器：消费慢时回压到网络线程，避免内存被请求堆积拖垮。</text>
</svg>
