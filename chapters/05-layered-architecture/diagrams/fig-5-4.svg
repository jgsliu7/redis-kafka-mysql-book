<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 560" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow44" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97706"/>
    </marker>
  </defs>

  <text x="420" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 5-4　MySQL Handler API 与可插拔存储引擎</text>
  <text x="420" y="54" text-anchor="middle" font-size="13" fill="#374151">服务层通过 handler 虚函数向下调用，引擎可并存、可替换</text>

  <!-- 服务层 -->
  <rect x="120" y="80" width="600" height="180" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="420" y="106" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">服务层（Server / SQL 层）</text>

  <rect x="150" y="120" width="150" height="44" rx="6" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="225" y="140" text-anchor="middle" font-size="12" fill="#111827">解析器 Parser</text>
  <text x="225" y="156" text-anchor="middle" font-size="10" fill="#6B7280">→ 解析树</text>

  <rect x="345" y="120" width="150" height="44" rx="6" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="420" y="140" text-anchor="middle" font-size="12" fill="#111827">优化器 Optimizer</text>
  <text x="420" y="156" text-anchor="middle" font-size="10" fill="#6B7280">→ 执行计划</text>

  <rect x="540" y="120" width="150" height="44" rx="6" fill="#FFFFFF" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="615" y="140" text-anchor="middle" font-size="12" fill="#111827">执行器 Executor</text>
  <text x="615" y="156" text-anchor="middle" font-size="10" fill="#6B7280">读行→评估→返回</text>

  <line x1="300" y1="142" x2="343" y2="142" stroke="#4B5563" stroke-width="1.4" marker-end="url(#arrow44)"/>
  <line x1="495" y1="142" x2="538" y2="142" stroke="#4B5563" stroke-width="1.4" marker-end="url(#arrow44)"/>

  <!-- 执行器 → handler 接口 -->
  <line x1="615" y1="164" x2="615" y2="200" stroke="#4B5563" stroke-width="1.4" marker-end="url(#arrow44)"/>

  <!-- Handler API 接口 -->
  <rect x="180" y="206" width="480" height="42" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="2.5"/>
  <text x="420" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#D97706">Handler API（接口契约 / 虚函数 vtable）</text>
  <text x="420" y="241" text-anchor="middle" font-size="11" fill="#374151">open / close · rnd_init / rnd_next · index_read · external_lock …</text>

  <!-- 向下分发线 -->
  <line x1="260" y1="248" x2="260" y2="290" stroke="#D97706" stroke-width="1.6" marker-end="url(#arrow44)"/>
  <line x1="490" y1="248" x2="490" y2="290" stroke="#D97706" stroke-width="1.6" marker-end="url(#arrow44)"/>
  <line x1="650" y1="248" x2="650" y2="290" stroke="#D97706" stroke-width="1.6" marker-end="url(#arrow44)"/>
  <text x="180" y="276" font-size="11" fill="#D97706" font-style="italic">多态调用</text>

  <!-- ===== 三个引擎 ===== -->
  <rect x="120" y="296" width="280" height="220" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="260" y="322" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">InnoDB（默认）</text>
  <line x1="140" y1="332" x2="380" y2="332" stroke="#FCD34D" stroke-width="1"/>
  <text x="140" y="354" font-size="12" fill="#374151">· ACID 事务</text>
  <text x="140" y="376" font-size="12" fill="#374151">· 行锁 + MVCC 多版本并发</text>
  <text x="140" y="398" font-size="12" fill="#374151">· 缓冲池 Buffer Pool</text>
  <text x="140" y="420" font-size="12" fill="#374151">· redo / undo（日志）</text>
  <text x="140" y="442" font-size="12" fill="#374151">· 表空间 .ibd + B+ 树</text>
  <rect x="160" y="462" width="200" height="32" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1"/>
  <text x="260" y="482" text-anchor="middle" font-size="11" fill="#374151">自身又是多层（事务/锁/缓存/日志）</text>

  <rect x="420" y="296" width="140" height="110" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="490" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">MyISAM</text>
  <text x="490" y="346" text-anchor="middle" font-size="11" fill="#374151">无事务</text>
  <text x="490" y="366" text-anchor="middle" font-size="11" fill="#374151">表锁</text>
  <text x="490" y="386" text-anchor="middle" font-size="11" fill="#374151">全文索引好</text>

  <rect x="580" y="296" width="140" height="110" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="650" y="322" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Memory</text>
  <text x="650" y="346" text-anchor="middle" font-size="11" fill="#374151">内存表</text>
  <text x="650" y="366" text-anchor="middle" font-size="11" fill="#374151">Hash 索引</text>
  <text x="650" y="386" text-anchor="middle" font-size="11" fill="#374151">重启即失</text>

  <rect x="580" y="416" width="140" height="48" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="650" y="436" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">Archive / NDB …</text>
  <text x="650" y="454" text-anchor="middle" font-size="10" fill="#6B7280">数十种引擎可并存</text>

  <!-- OS 文件层 -->
  <rect x="120" y="530" width="600" height="0" rx="6" fill="none"/>

  <text x="60" y="546" font-size="11" fill="#EF4444" font-weight="600">代价：</text>
  <text x="100" y="546" font-size="11" fill="#374151">每次行操作都过一次虚函数调用，这是 MySQL 为「可插拔」支付的固有开销。</text>
</svg>
