<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 2-1　启动与关闭：状态机的重建与快照</text>

  <!-- Three states along the top: 磁盘上的不完整状态 - 启动 - 可服务状态 - 关闭 -->
  <!-- Left disk state -->
  <rect x="40" y="190" width="160" height="90" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="120" y="222" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">磁盘上的不完整状态</text>
  <text x="120" y="244" text-anchor="middle" font-size="12" fill="#374151">上次崩溃/关闭时</text>
  <text x="120" y="262" text-anchor="middle" font-size="12" fill="#374151">落盘的快照 + 日志</text>

  <!-- Center running state -->
  <rect x="360" y="190" width="160" height="90" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="440" y="222" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">可服务状态</text>
  <text x="440" y="244" text-anchor="middle" font-size="12" fill="#374151">内存里一致、</text>
  <text x="440" y="262" text-anchor="middle" font-size="12" fill="#374151">可对外承接请求</text>

  <!-- Right disk state (snapshot produced) -->
  <rect x="680" y="190" width="160" height="90" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="760" y="222" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">落盘的快照</text>
  <text x="760" y="244" text-anchor="middle" font-size="12" fill="#374151">脏状态刷盘 + </text>
  <text x="760" y="262" text-anchor="middle" font-size="12" fill="#374151">释放连接 / 锁 / 身份</text>

  <!-- Start arrow: disk -> running (启动=重建) -->
  <path d="M210 215 L355 215" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="282" y="178" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">启动：状态机重建</text>
  <text x="282" y="205" text-anchor="middle" font-size="12" fill="#374151">把不完整状态重建为一致状态</text>

  <!-- Shutdown arrow: running -> disk (关闭=快照+释放) -->
  <path d="M525 255 L675 255" fill="none" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="600" y="295" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">关闭：快照 + 资源释放</text>
  <text x="600" y="318" text-anchor="middle" font-size="12" fill="#374151">守数据 · 清职责 · 退进程</text>

  <!-- Crash dashed arrow (return to incomplete state, the loop) -->
  <path d="M440 290 C 440 400, 120 410, 120 285" fill="none" stroke="#EF4444" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arrowR)"/>
  <text x="260" y="410" text-anchor="middle" font-size="12" fill="#EF4444">崩溃 / kill -9：被迫回到不完整状态，下次启动需恢复</text>

  <!-- Three contradictions box -->
  <rect x="40" y="440" width="800" height="86" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="440" y="464" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">贯穿全章的三对矛盾</text>
  <text x="60" y="488" font-size="12.5" fill="#374151">① 一致性 vs 可用性　　多恢复一步更安全，但用户等得更久</text>
  <text x="60" y="508" font-size="12.5" fill="#374151">② 速度 vs 确定性　　　快速就绪（懒加载）还是已知的确定状态（全量校验）</text>
  <text x="60" y="524" font-size="12.5" fill="#374151">③ 单机视角 vs 分布式视角　自己退出，还是先把职责交出去</text>
</svg>
