<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowInd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97706"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 3-3　InnoDB 缓冲池三分链表</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#374151">Free List（空闲页）·LRU List（新老分区 5/8 与 3/8）·Flush List（脏页排队刷盘）</text>

  <!-- ===== Free List ===== -->
  <rect x="40" y="90" width="240" height="200" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="160" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Free List（空闲页池）</text>
  <line x1="60" y1="124" x2="260" y2="124" stroke="#FDE68A" stroke-width="1"/>
  <g font-size="11" fill="#111827">
    <rect x="60" y="138" width="50" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="85" y="156" text-anchor="middle">空闲页</text>
    <rect x="116" y="138" width="50" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="141" y="156" text-anchor="middle">空闲页</text>
    <rect x="172" y="138" width="50" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="197" y="156" text-anchor="middle">空闲页</text>
    <rect x="60" y="172" width="50" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="85" y="190" text-anchor="middle">空闲页</text>
    <rect x="116" y="172" width="50" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="141" y="190" text-anchor="middle">空闲页</text>
    <rect x="172" y="172" width="50" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="197" y="190" text-anchor="middle">...</text>
  </g>
  <text x="160" y="226" text-anchor="middle" font-size="11" fill="#374151">读新页时从池中取一页</text>
  <text x="160" y="244" text-anchor="middle" font-size="11" fill="#374151">用完后或淘汰后归还</text>
  <text x="160" y="270" text-anchor="middle" font-size="11" fill="#6B7280">读路径的页来源</text>

  <!-- ===== LRU List ===== -->
  <rect x="320" y="90" width="600" height="200" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="620" y="114" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">LRU List（改良版，新老分区）</text>

  <!-- New sublist (5/8) -->
  <rect x="340" y="128" width="360" height="44" rx="4" fill="#FFFFFF" stroke="#D97706"/>
  <text x="520" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">New Sublist（热区，5/8）</text>
  <g font-size="10" fill="#111827">
    <rect x="350" y="152" width="42" height="16" rx="2" fill="#FEF3C7" stroke="#D97706"/><text x="371" y="164" text-anchor="middle">热页</text>
    <rect x="396" y="152" width="42" height="16" rx="2" fill="#FEF3C7" stroke="#D97706"/><text x="417" y="164" text-anchor="middle">热页</text>
    <rect x="442" y="152" width="42" height="16" rx="2" fill="#FEF3C7" stroke="#D97706"/><text x="463" y="164" text-anchor="middle">热页</text>
    <rect x="488" y="152" width="42" height="16" rx="2" fill="#FEF3C7" stroke="#D97706"/><text x="509" y="164" text-anchor="middle">热页</text>
    <rect x="534" y="152" width="42" height="16" rx="2" fill="#FEF3C7" stroke="#D97706"/><text x="555" y="164" text-anchor="middle">热页</text>
    <rect x="580" y="152" width="42" height="16" rx="2" fill="#FEF3C7" stroke="#D97706"/><text x="601" y="164" text-anchor="middle">...</text>
    <rect x="626" y="152" width="42" height="16" rx="2" fill="#FEF3C7" stroke="#D97706"/><text x="647" y="164" text-anchor="middle">热页</text>
  </g>

  <!-- midpoint -->
  <line x1="540" y1="120" x2="540" y2="200" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <rect x="500" y="104" width="80" height="18" rx="3" fill="#FEE2E2" stroke="#EF4444"/>
  <text x="540" y="117" text-anchor="middle" font-size="11" font-weight="700" fill="#EF4444">midpoint</text>

  <!-- Old sublist (3/8) -->
  <rect x="700" y="128" width="216" height="44" rx="4" fill="#FFFFFF" stroke="#D97706" stroke-dasharray="4,3"/>
  <text x="808" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">Old Sublist（冷区，3/8）</text>
  <g font-size="10" fill="#111827">
    <rect x="710" y="152" width="42" height="16" rx="2" fill="#FFFBEB" stroke="#D97706"/><text x="731" y="164" text-anchor="middle">冷页</text>
    <rect x="756" y="152" width="42" height="16" rx="2" fill="#FFFBEB" stroke="#D97706"/><text x="777" y="164" text-anchor="middle">冷页</text>
    <rect x="802" y="152" width="42" height="16" rx="2" fill="#FFFBEB" stroke="#D97706"/><text x="823" y="164" text-anchor="middle">冷页</text>
    <rect x="848" y="152" width="42" height="16" rx="2" fill="#FFFBEB" stroke="#D97706"/><text x="869" y="164" text-anchor="middle">...</text>
  </g>

  <!-- new page entry -->
  <rect x="340" y="196" width="576" height="36" rx="4" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.2"/>
  <text x="360" y="218" font-size="11" fill="#374151">新读入页 → 插入 midpoint（Old 区头部），而非链表头部</text>

  <!-- promotion -->
  <text x="360" y="252" font-size="11" fill="#374151">Old 区停留 &gt; innodb_old_blocks_time（默认 1s）后再次被访问 →</text>
  <text x="360" y="270" font-size="11" fill="#EF4444" font-weight="700">晋升 New 区</text>
  <text x="560" y="270" font-size="11" fill="#374151">（全表扫描的页来不及晋升 → 被及时挤走，不污染热区）</text>

  <!-- eviction -->
  <text x="700" y="270" font-size="11" fill="#374151">← 尾部淘汰</text>
  <path d="M 870 152 Q 900 152 900 250 Q 900 285 880 285" fill="none" stroke="#EF4444" stroke-width="1.4" marker-end="url(#arrowRed)"/>

  <!-- ===== Flush List ===== -->
  <rect x="320" y="320" width="600" height="160" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="620" y="344" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Flush List（脏页队列，按最早修改时间排序）</text>
  <g font-size="11" fill="#111827">
    <rect x="340" y="362" width="64" height="34" rx="4" fill="#FEE2E2" stroke="#EF4444"/><text x="372" y="383" text-anchor="middle">脏页①</text>
    <rect x="410" y="362" width="64" height="34" rx="4" fill="#FEE2E2" stroke="#EF4444"/><text x="442" y="383" text-anchor="middle">脏页②</text>
    <rect x="480" y="362" width="64" height="34" rx="4" fill="#FEE2E2" stroke="#EF4444"/><text x="512" y="383" text-anchor="middle">脏页③</text>
    <rect x="550" y="362" width="64" height="34" rx="4" fill="#FEE2E2" stroke="#EF4444"/><text x="582" y="383" text-anchor="middle">脏页④</text>
    <rect x="620" y="362" width="64" height="34" rx="4" fill="#FEE2E2" stroke="#EF4444"/><text x="652" y="383" text-anchor="middle">...</text>
  </g>
  <text x="340" y="416" font-size="11" fill="#374151">页被修改 → 进入 Flush List（同时仍在 LRU List 中，两链表交叉）</text>
  <text x="340" y="436" font-size="11" fill="#374151">后台线程按此队列做 Checkpoint：顺序刷盘 → 磁盘</text>
  <text x="340" y="458" font-size="11" fill="#6B7280">刷盘后从 Flush List 移除（仍留 LRU 直到被淘汰或换出）</text>

  <!-- Free -> LRU arrow -->
  <path d="M 280 180 L 316 180" fill="none" stroke="#D97706" stroke-width="1.6" marker-end="url(#arrowInd)"/>
  <text x="298" y="172" text-anchor="middle" font-size="10" fill="#D97706">取页</text>

  <!-- LRU modify -> Flush -->
  <path d="M 620 296 L 620 316" fill="none" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>
  <text x="630" y="310" font-size="10" fill="#EF4444">页被改</text>

  <!-- Disk -->
  <rect x="320" y="520" width="600" height="60" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.6"/>
  <text x="620" y="548" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">磁盘（表空间 / 重做日志）</text>
  <text x="620" y="568" text-anchor="middle" font-size="12" fill="#374151">Checkpoint 把脏页顺序写回；崩溃靠重做日志重放补齐</text>

  <!-- Flush -> Disk -->
  <path d="M 620 484 L 620 516" fill="none" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>
  <text x="630" y="504" font-size="10" fill="#EF4444">Checkpoint 刷盘</text>

  <!-- Evicted page returns to Free List -->
  <path d="M 540 200 Q 200 200 160 200 Q 90 200 90 250 Q 90 290 100 290" fill="none" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="230" y="240" font-size="10" fill="#6B7280">淘汰的页归还 Free List</text>

  <!-- bottom note -->
  <rect x="40" y="600" width="880" height="80" rx="6" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.2"/>
  <text x="60" y="624" font-size="13" font-weight="700" fill="#111827">设计要点</text>
  <text x="60" y="646" font-size="12" fill="#374151">1）三分链表各司其职：Free 管空闲、LRU 管命中、Flush 管刷盘；同一页可同时位于 LRU 与 Flush。</text>
  <text x="60" y="666" font-size="12" fill="#374151">2）老区分流 + 停留时间门槛，专门对付「全表扫描污染缓冲池」这一陷阱。</text>
</svg>
