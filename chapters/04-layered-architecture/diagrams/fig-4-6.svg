<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 600" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr47" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arr47g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
    <marker id="arr47r" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <text x="430" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 4-6　Kafka Log 复用：消费读路径 = 副本同步路径</text>
  <text x="430" y="54" text-anchor="middle" font-size="13" fill="#374151">消费者与 Follower 走同一条 Log 读取 + sendfile 零拷贝路径，存储与复制共享一份代码</text>

  <!-- ===== 左侧：消费者场景 ===== -->
  <text x="180" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">场景 A：消费者拉历史数据</text>

  <rect x="60" y="100" width="120" height="38" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <text x="120" y="124" text-anchor="middle" font-size="12" fill="#111827">Consumer</text>

  <line x1="120" y1="138" x2="120" y2="166" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr47)"/>
  <text x="130" y="156" font-size="11" fill="#111827">FETCH 请求</text>

  <rect x="60" y="170" width="240" height="36" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.3"/>
  <text x="180" y="192" text-anchor="middle" font-size="12" fill="#111827">KafkaApis.handleFetchRequest()</text>

  <line x1="180" y1="206" x2="180" y2="234" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr47)"/>

  <rect x="60" y="238" width="240" height="44" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="180" y="258" text-anchor="middle" font-size="12" fill="#111827">ReplicaManager.fetchMessages()</text>
  <text x="180" y="274" text-anchor="middle" font-size="11" fill="#6B7280">统一入口（不分消费 / 复制）</text>

  <line x1="180" y1="282" x2="180" y2="310" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arr47r)"/>
  <text x="190" y="300" font-size="11" fill="#EF4444" font-weight="600">同一条读路径</text>

  <!-- ===== 右侧：Follower 场景 ===== -->
  <text x="680" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">场景 B：Follower 同步 Leader 日志</text>

  <rect x="560" y="100" width="120" height="38" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.3"/>
  <text x="620" y="124" text-anchor="middle" font-size="12" fill="#111827">Follower 副本</text>

  <line x1="620" y1="138" x2="620" y2="166" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr47)"/>
  <text x="630" y="156" font-size="11" fill="#111827">FETCH 请求</text>

  <rect x="560" y="170" width="240" height="36" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.3"/>
  <text x="680" y="192" text-anchor="middle" font-size="12" fill="#111827">KafkaApis.handleFetchRequest()</text>

  <line x1="680" y1="206" x2="680" y2="234" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arr47)"/>

  <rect x="560" y="238" width="240" height="44" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="680" y="258" text-anchor="middle" font-size="12" fill="#111827">ReplicaManager.fetchMessages()</text>
  <text x="680" y="274" text-anchor="middle" font-size="11" fill="#6B7280">同一方法，仅标志位不同</text>

  <line x1="620" y1="282" x2="620" y2="310" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arr47r)"/>
  <text x="630" y="300" font-size="11" fill="#EF4444" font-weight="600">同一条读路径</text>

  <!-- ===== 共享存储层（汇合） ===== -->
  <rect x="60" y="314" width="740" height="158" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="2"/>
  <text x="430" y="338" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">Leader Log（存储层 · 共享）</text>

  <rect x="90" y="352" width="190" height="44" rx="6" fill="#FFFFFF" stroke="#6EE7B7" stroke-width="1.3"/>
  <text x="185" y="372" text-anchor="middle" font-size="12" fill="#111827">按 offset 二分定位日志段</text>
  <text x="185" y="388" text-anchor="middle" font-size="10" fill="#6B7280">LogSegment + 稀疏索引</text>

  <rect x="300" y="352" width="190" height="44" rx="6" fill="#FFFFFF" stroke="#6EE7B7" stroke-width="1.3"/>
  <text x="395" y="372" text-anchor="middle" font-size="12" fill="#111827">命中页缓存 page cache</text>
  <text x="395" y="388" text-anchor="middle" font-size="10" fill="#6B7280">消费多优先走内存</text>

  <rect x="510" y="352" width="260" height="44" rx="6" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/>
  <text x="640" y="372" text-anchor="middle" font-size="12" font-weight="600" fill="#D97706">sendfile 零拷贝</text>
  <text x="640" y="388" text-anchor="middle" font-size="10" fill="#374151">磁盘→页缓存→网卡，跳过用户态</text>

  <line x1="280" y1="374" x2="298" y2="374" stroke="#4B5563" stroke-width="1.3" marker-end="url(#arr47)"/>
  <line x1="490" y1="374" x2="508" y2="374" stroke="#D97706" stroke-width="1.4" marker-end="url(#arr47)"/>

  <!-- 返回响应 -->
  <rect x="90" y="408" width="680" height="44" rx="6" fill="#FFFBEB" stroke="#EF4444" stroke-width="1.5"/>
  <text x="430" y="428" text-anchor="middle" font-size="12" fill="#111827">返回：消息批次 + 高水位 HW + LEO（位移末尾）</text>
  <text x="430" y="445" text-anchor="middle" font-size="11" fill="#6B7280">响应路径同样共享；Follower 用 HW 推进自己的副本位置</text>

  <!-- 响应箭头回到两侧 -->
  <line x1="180" y1="408" x2="120" y2="320" stroke="#EF4444" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr47r)"/>
  <line x1="680" y1="408" x2="620" y2="320" stroke="#EF4444" stroke-width="1.3" stroke-dasharray="5 3" marker-end="url(#arr47r)"/>

  <!-- ===== 底部注释 ===== -->
  <rect x="40" y="492" width="780" height="92" rx="6" fill="#ECFDF5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="60" y="514" font-size="12" font-weight="600" fill="#111827">设计红利：Log 抽象让存储层与复制层共享同一份代码</text>
  <text x="60" y="534" font-size="11" fill="#374151">· Follower 复制 = 「一个特殊的消费者」，无需为复制单独写读路径；新增功能只改一处。</text>
  <text x="60" y="554" font-size="11" fill="#374151">· sendfile 零拷贝对两条路径都生效：省掉 2 次内核↔用户态拷贝和 2 次上下文切换。</text>
  <text x="60" y="574" font-size="11" fill="#374151">· 代价：存储层做得「异常薄」（就是追加写日志），换来极快，但存储几乎不可插拔——复杂度被推到上层（索引、复制、压实）。</text>
</svg>
