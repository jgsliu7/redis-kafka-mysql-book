<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 620" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <text x="380" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 4-1　Redis 命令处理流水线</text>
  <text x="380" y="54" text-anchor="middle" font-size="13" fill="#374151">交互层与逻辑层用 client 结构体衔接，全程无序列化</text>

  <!-- 三层背景带（左侧标注）-->
  <rect x="36" y="76" width="4" height="170" rx="2" fill="#4F46E5" opacity="0.55"/>
  <text x="28" y="100" text-anchor="end" font-size="12" font-weight="600" fill="#4F46E5">交互层</text>
  <rect x="36" y="256" width="4" height="260" rx="2" fill="#4F46E5"/>
  <text x="28" y="300" text-anchor="end" font-size="12" font-weight="600" fill="#4F46E5">逻辑层</text>
  <rect x="36" y="526" width="4" height="60" rx="2" fill="#4F46E5" opacity="0.7"/>
  <text x="28" y="560" text-anchor="end" font-size="12" font-weight="600" fill="#4F46E5">存储层</text>

  <!-- 步骤 1：RESP 解析 -->
  <rect x="80" y="86" width="340" height="56" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="250" y="110" text-anchor="middle" font-size="14" fill="#111827">① RESP 协议解析</text>
  <text x="250" y="130" text-anchor="middle" font-size="11" fill="#374151">边读边解析，不等完整命令；填入 client 结构</text>

  <!-- client 结构体（贯穿）-->
  <rect x="470" y="86" width="220" height="500" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="580" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">client 结构体</text>
  <line x1="490" y1="118" x2="670" y2="118" stroke="#9CA3AF" stroke-width="1"/>
  <text x="580" y="138" text-anchor="middle" font-size="11" fill="#374151">· 查询缓冲区 querybuf</text>
  <text x="580" y="158" text-anchor="middle" font-size="11" fill="#374151">· 参数 argv / argc</text>
  <text x="580" y="178" text-anchor="middle" font-size="11" fill="#374151">· 当前命令 cmd 指针</text>
  <text x="580" y="198" text-anchor="middle" font-size="11" fill="#374151">· 当前 db 索引</text>
  <text x="580" y="218" text-anchor="middle" font-size="11" fill="#374151">· 输出缓冲区（固定+动态）</text>
  <text x="580" y="238" text-anchor="middle" font-size="11" fill="#374151">· 用户 / ACL 标志</text>
  <text x="580" y="276" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">跨层共享的会话上下文</text>
  <text x="580" y="294" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">（替代层层复制参数）</text>

  <!-- 箭头 1->2 -->
  <line x1="250" y1="142" x2="250" y2="170" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="420" y1="114" x2="468" y2="114" stroke="#4B5563" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrow4)"/>

  <!-- 步骤 2：命令表查找 -->
  <rect x="80" y="174" width="340" height="56" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="250" y="198" text-anchor="middle" font-size="14" fill="#111827">② 命令表查找 redisCommandTable</text>
  <text x="250" y="218" text-anchor="middle" font-size="11" fill="#374151">按命令名哈希一次，取到处理函数指针 + 命令标志</text>

  <line x1="250" y1="230" x2="250" y2="262" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- 步骤 3：ACL / 参数校验 -->
  <rect x="80" y="266" width="340" height="56" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="250" y="290" text-anchor="middle" font-size="14" fill="#111827">③ ACL 权限 + 参数校验</text>
  <text x="250" y="310" text-anchor="middle" font-size="11" fill="#374151">读命令标志位判断读写 / 键位置 / 是否阻塞</text>

  <line x1="250" y1="322" x2="250" y2="354" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrowRed4)"/>

  <!-- 步骤 4：执行 -->
  <rect x="80" y="358" width="340" height="68" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="250" y="384" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">④ 命令执行 cmd-&gt;proc(client)</text>
  <text x="250" y="404" text-anchor="middle" font-size="11" fill="#374151">单线程串行；调用逻辑层处理函数，操作 db 中的对象</text>
  <text x="250" y="420" text-anchor="middle" font-size="11" fill="#374151">（此处仍与交互层同线程，无上下文切换）</text>

  <line x1="250" y1="426" x2="250" y2="458" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- 步骤 5：监控 / 慢查询钩子 -->
  <rect x="80" y="462" width="340" height="48" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="250" y="483" text-anchor="middle" font-size="13" fill="#111827">⑤ 慢查询 / MONITOR 钩子</text>
  <text x="250" y="500" text-anchor="middle" font-size="11" fill="#374151">耗时统计、复制传播（写命令）</text>

  <line x1="250" y1="510" x2="250" y2="536" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <!-- 步骤 6：存储层 -->
  <rect x="80" y="540" width="340" height="48" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="250" y="561" text-anchor="middle" font-size="13" fill="#111827">⑥ robj 存取（内存） + AOF/RDB（可选）</text>
  <text x="250" y="578" text-anchor="middle" font-size="11" fill="#374151">通过 robj 指针直接访问内存，无序列化</text>

  <line x1="420" y1="200" x2="468" y2="200" stroke="#4B5563" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrow4)"/>
  <line x1="420" y1="392" x2="468" y2="392" stroke="#4B5563" stroke-width="1.2" stroke-dasharray="3 3" marker-end="url(#arrow4)"/>
</svg>
