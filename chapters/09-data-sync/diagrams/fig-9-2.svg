<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 9-2　状态机复制模型</text>
  <text x="440" y="54" text-anchor="middle" font-size="13" fill="#374151">若每个副本按相同顺序执行相同输入序列，最终状态必然相同 — 这是三款软件同步的共同底层模型</text>

  <!-- 顶部：同一个有序输入序列 -->
  <rect x="120" y="80" width="640" height="62" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="440" y="100" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">同一个有序输入序列（log / 日志 / 命令流）</text>
  <text x="180" y="124" font-size="12" fill="#374151">op1</text>
  <text x="220" y="124" font-size="12" fill="#6B7280">→</text>
  <text x="260" y="124" font-size="12" fill="#374151">op2</text>
  <text x="300" y="124" font-size="12" fill="#6B7280">→</text>
  <text x="340" y="124" font-size="12" fill="#374151">op3</text>
  <text x="380" y="124" font-size="12" fill="#6B7280">→</text>
  <text x="420" y="124" font-size="12" fill="#374151">op4</text>
  <text x="460" y="124" font-size="12" fill="#6B7280">→</text>
  <text x="500" y="124" font-size="12" fill="#374151">op5</text>
  <text x="540" y="124" font-size="12" fill="#6B7280">→</text>
  <text x="600" y="124" font-size="12" fill="#374151">op6 …</text>

  <!-- 分发到三个副本（Redis / MySQL / Kafka 配色） -->
  <line x1="200" y1="142" x2="160" y2="178" stroke="#4B5563" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="440" y1="142" x2="440" y2="178" stroke="#4B5563" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="680" y1="142" x2="720" y2="178" stroke="#4B5563" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- =========== 副本 A：Redis =========== -->
  <rect x="40" y="182" width="240" height="240" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.8"/>
  <text x="160" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#4F46E5">副本 A · Redis</text>
  <text x="160" y="224" text-anchor="middle" font-size="11" fill="#374151">序列载体：命令流</text>

  <text x="60" y="250" font-size="12" fill="#374151">初始状态 S0</text>
  <line x1="60" y1="258" x2="260" y2="258" stroke="#4F46E5" stroke-width="0.8" stroke-dasharray="3 2"/>

  <text x="60" y="280" font-size="12" fill="#111827">apply(op1) → S1</text>
  <text x="60" y="300" font-size="12" fill="#111827">apply(op2) → S2</text>
  <text x="60" y="320" font-size="12" fill="#111827">apply(op3) → S3</text>
  <text x="60" y="340" font-size="12" fill="#111827">apply(op4) → S4</text>
  <text x="60" y="360" font-size="12" fill="#111827">apply(op5) → S5</text>
  <line x1="60" y1="368" x2="260" y2="368" stroke="#4F46E5" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="60" y="392" font-size="12" font-weight="700" fill="#059669">最终状态 S5</text>
  <text x="60" y="410" font-size="11" fill="#6B7280">执行方式：命令解释执行</text>

  <!-- =========== 副本 B：MySQL =========== -->
  <rect x="320" y="182" width="240" height="240" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.8"/>
  <text x="440" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">副本 B · MySQL</text>
  <text x="440" y="224" text-anchor="middle" font-size="11" fill="#374151">序列载体：binlog event</text>

  <text x="340" y="250" font-size="12" fill="#374151">初始状态 S0</text>
  <line x1="340" y1="258" x2="540" y2="258" stroke="#D97706" stroke-width="0.8" stroke-dasharray="3 2"/>

  <text x="340" y="280" font-size="12" fill="#111827">apply(op1) → S1</text>
  <text x="340" y="300" font-size="12" fill="#111827">apply(op2) → S2</text>
  <text x="340" y="320" font-size="12" fill="#111827">apply(op3) → S3</text>
  <text x="340" y="340" font-size="12" fill="#111827">apply(op4) → S4</text>
  <text x="340" y="360" font-size="12" fill="#111827">apply(op5) → S5</text>
  <line x1="340" y1="368" x2="540" y2="368" stroke="#D97706" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="340" y="392" font-size="12" font-weight="700" fill="#059669">最终状态 S5</text>
  <text x="340" y="410" font-size="11" fill="#6B7280">执行方式：SQL 线程回放</text>

  <!-- =========== 副本 C：Kafka =========== -->
  <rect x="600" y="182" width="240" height="240" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="720" y="206" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">副本 C · Kafka</text>
  <text x="720" y="224" text-anchor="middle" font-size="11" fill="#374151">序列载体：消息日志</text>

  <text x="620" y="250" font-size="12" fill="#374151">初始状态 S0</text>
  <line x1="620" y1="258" x2="820" y2="258" stroke="#059669" stroke-width="0.8" stroke-dasharray="3 2"/>

  <text x="620" y="280" font-size="12" fill="#111827">apply(op1) → S1</text>
  <text x="620" y="300" font-size="12" fill="#111827">apply(op2) → S2</text>
  <text x="620" y="320" font-size="12" fill="#111827">apply(op3) → S3</text>
  <text x="620" y="340" font-size="12" fill="#111827">apply(op4) → S4</text>
  <text x="620" y="360" font-size="12" fill="#111827">apply(op5) → S5</text>
  <line x1="620" y1="368" x2="820" y2="368" stroke="#059669" stroke-width="0.8" stroke-dasharray="3 2"/>
  <text x="620" y="392" font-size="12" font-weight="700" fill="#059669">最终状态 S5</text>
  <text x="620" y="410" font-size="11" fill="#6B7280">执行方式：日志追加复制</text>

  <!-- 三路汇合到同一最终状态 -->
  <line x1="160" y1="422" x2="380" y2="448" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="440" y1="422" x2="440" y2="448" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="720" y1="422" x2="500" y2="448" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <rect x="270" y="452" width="340" height="44" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.8"/>
  <text x="440" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">三个副本最终状态必然相同</text>
  <text x="440" y="489" text-anchor="middle" font-size="11" fill="#374151">差异只在序列的载体与执行的方式</text>

  <!-- 底注箴言 -->
  <rect x="60" y="514" width="760" height="34" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2"/>
  <text x="440" y="535" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">箴言：同步不是搬运数据，而是重放历史</text>
</svg>
