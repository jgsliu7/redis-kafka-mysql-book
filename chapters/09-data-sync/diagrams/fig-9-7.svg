<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 700" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="470" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 9-7　Kafka Follower FETCH + LEO/HW + leader epoch</text>
  <text x="470" y="52" text-anchor="middle" font-size="13" fill="#374151">纯拉模式同步：HW = ISR 中最小 LEO，消费者只能读 HW 以下；leader epoch 防止老 Leader 复活导致的日志分叉</text>

  <!-- =========== 上半：LEO/HW 时序 =========== -->
  <text x="470" y="84" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">① Leader / Follower / ISR 与 HW 的进度关系</text>

  <!-- Leader 日志 -->
  <rect x="60" y="100" width="820" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="80" y="120" font-size="13" font-weight="700" fill="#111827">Leader 日志（按位移追加）</text>
  <!-- 5 个消息格 -->
  <rect x="200" y="118" width="110" height="34" rx="3" fill="#FFFFFF" stroke="#059669"/>
  <text x="255" y="132" text-anchor="middle" font-size="11" fill="#374151">m0</text>
  <text x="255" y="146" text-anchor="middle" font-size="10" fill="#6B7280">off=0</text>

  <rect x="314" y="118" width="110" height="34" rx="3" fill="#FFFFFF" stroke="#059669"/>
  <text x="369" y="132" text-anchor="middle" font-size="11" fill="#374151">m1</text>
  <text x="369" y="146" text-anchor="middle" font-size="10" fill="#6B7280">off=1</text>

  <rect x="428" y="118" width="110" height="34" rx="3" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.6"/>
  <text x="483" y="132" text-anchor="middle" font-size="11" fill="#111827">m2（新写）</text>
  <text x="483" y="146" text-anchor="middle" font-size="10" fill="#6B7280">off=2</text>

  <rect x="542" y="118" width="110" height="34" rx="3" fill="#F3F4F6" stroke="#6B7280" stroke-dasharray="3 2"/>
  <text x="597" y="132" text-anchor="middle" font-size="11" fill="#6B7280">m3</text>
  <text x="597" y="146" text-anchor="middle" font-size="10" fill="#6B7280">off=3</text>

  <rect x="656" y="118" width="110" height="34" rx="3" fill="#F3F4F6" stroke="#6B7280" stroke-dasharray="3 2"/>
  <text x="711" y="132" text-anchor="middle" font-size="11" fill="#6B7280">m4</text>
  <text x="711" y="146" text-anchor="middle" font-size="10" fill="#6B7280">off=4</text>

  <!-- LEO 指针（Leader） -->
  <line x1="711" y1="164" x2="711" y2="180" stroke="#EF4444" stroke-width="2"/>
  <polygon points="705,178 717,178 711,188" fill="#EF4444"/>
  <text x="711" y="204" text-anchor="middle" font-size="12" font-weight="700" fill="#EF4444">Leader LEO = 5（日志末端）</text>

  <!-- Follower 日志 -->
  <rect x="60" y="220" width="820" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="80" y="240" font-size="13" font-weight="700" fill="#111827">Follower 日志（仅同步到 m1）</text>
  <rect x="200" y="238" width="110" height="34" rx="3" fill="#FFFFFF" stroke="#059669"/>
  <text x="255" y="262" text-anchor="middle" font-size="11" fill="#374151">m0 ✓</text>
  <rect x="314" y="238" width="110" height="34" rx="3" fill="#FFFFFF" stroke="#059669"/>
  <text x="369" y="262" text-anchor="middle" font-size="11" fill="#374151">m1 ✓</text>
  <rect x="428" y="238" width="110" height="34" rx="3" fill="#F3F4F6" stroke="#6B7280" stroke-dasharray="3 2"/>
  <text x="483" y="262" text-anchor="middle" font-size="11" fill="#6B7280">尚未拉到</text>

  <!-- Follower LEO 指针 -->
  <line x1="369" y1="284" x2="369" y2="300" stroke="#4B5563" stroke-width="2"/>
  <polygon points="363,298 375,298 369,308" fill="#4B5563"/>
  <text x="369" y="324" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">Follower LEO = 2</text>

  <!-- FETCH 箭头（标签框置于箭头左侧间隙，避免箭头曲线穿过自家标签） -->
  <path d="M 440 260 Q 500 195 540 160" fill="none" stroke="#059669" stroke-width="1.6" marker-end="url(#arrowGreen)"/>
  <rect x="270" y="178" width="160" height="36" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.3"/>
  <text x="350" y="192" text-anchor="middle" font-size="11" font-weight="600" fill="#059669">FETCH（同消费者读路径）</text>
  <text x="350" y="207" text-anchor="middle" font-size="10" fill="#374151">"给我 off≥2 的消息"</text>

  <!-- HW 计算 -->
  <rect x="60" y="340" width="820" height="76" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.6"/>
  <text x="80" y="362" font-size="13" font-weight="700" fill="#EF4444">HW（高水位）= ISR 中最小 LEO = min(Leader LEO 5, Follower LEO 2) = 2</text>
  <text x="80" y="384" font-size="12" fill="#374151">只有 HW 以下的消息算"已提交"，消费者只能读到 HW</text>
  <text x="80" y="404" font-size="12" fill="#374151">ISR：跟上 Leader 的动态副本集合；只有 ISR 成员才有资格当选新 Leader</text>

  <!-- 分隔线 -->
  <line x1="60" y1="436" x2="880" y2="436" stroke="#6B7280" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- =========== 下半：leader epoch 截断脑裂 =========== -->
  <text x="470" y="466" text-anchor="middle" font-size="14" font-weight="700" fill="#059669">② leader epoch 截断不一致尾部（解决脑裂）</text>

  <!-- 老 Leader 复活场景，三栏：旧主 / 新主 / Follower恢复 -->
  <!-- Epoch 1 段 -->
  <rect x="70" y="488" width="260" height="80" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="200" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">epoch=1（旧 Leader L1）</text>
  <text x="90" y="532" font-size="11" fill="#374151">日志：m0 m1 m2 m3 m4</text>
  <text x="90" y="552" font-size="11" fill="#374151">L1 短暂失联，被仲裁下线</text>

  <!-- Epoch 2 段 -->
  <rect x="340" y="488" width="260" height="80" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="470" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">epoch=2（新 Leader L2）</text>
  <text x="360" y="532" font-size="11" fill="#374151">新主只确认到 m2，新写 m2'</text>
  <text x="360" y="552" font-size="11" fill="#374151">权威日志：m0 m1 m2 m2'</text>

  <!-- L1 复活 -->
  <rect x="610" y="488" width="270" height="80" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="745" y="510" text-anchor="middle" font-size="12" font-weight="700" fill="#EF4444">L1 复活，试图以 Follower 加入</text>
  <text x="630" y="532" font-size="11" fill="#374151">L1 仍持 m3 m4（已被新主否决）</text>
  <text x="630" y="552" font-size="11" fill="#374151">若不截断 → 数据分叉（脑裂）</text>

  <!-- 截断过程 -->
  <line x1="470" y1="568" x2="470" y2="588" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>
  <rect x="120" y="592" width="700" height="74" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
  <text x="470" y="614" text-anchor="middle" font-size="13" font-weight="700" fill="#EF4444">leader epoch 协议：副本恢复时按 epoch 比对</text>
  <text x="140" y="636" font-size="12" fill="#374151">L1 携带 (epoch=1, lastOffset=4) FETCH；L2 回 EndOffsetForEpoch(epoch=1, endOffset=3)</text>
  <text x="140" y="656" font-size="12" font-weight="700" fill="#059669">L1 自身 epoch=1 到 off=4，超过权威 endOffset=3 → 截断 m3 m4，对齐 off=3 后追赶 L2</text>
</svg>
