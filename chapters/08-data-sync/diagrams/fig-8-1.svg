<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="410" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">数据同步的四个子问题</text>
  <text x="410" y="56" text-anchor="middle" font-size="13" fill="#374151">一道状态变化，要可靠、有界延迟地传播到其他副本</text>

  <!-- 中心节点：一处状态变化 -->
  <rect x="330" y="86" width="160" height="56" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="410" y="110" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">一处状态变化</text>
  <text x="410" y="129" text-anchor="middle" font-size="12" fill="#374151">主节点上的写入</text>

  <!-- 分叉线到四个子问题 -->
  <line x1="410" y1="142" x2="410" y2="172" stroke="#4B5563" stroke-width="1.5"/>
  <line x1="160" y1="172" x2="660" y2="172" stroke="#4B5563" stroke-width="1.5"/>
  <line x1="160" y1="172" x2="160" y2="200" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="327" y1="172" x2="327" y2="200" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="493" y1="172" x2="493" y2="200" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="172" x2="660" y2="200" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 子问题1：传播什么 -->
  <rect x="70" y="206" width="180" height="92" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="160" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">① 传播什么</text>
  <text x="160" y="252" text-anchor="middle" font-size="12" fill="#374151">传播单元的粒度</text>
  <text x="160" y="271" text-anchor="middle" font-size="11" fill="#374151">命令 / 事件 / 消息</text>
  <text x="160" y="289" text-anchor="middle" font-size="11" fill="#6B7280">Redis命令 · MySQL事件 · Kafka消息</text>

  <!-- 子问题2：怎么传播 -->
  <rect x="237" y="206" width="180" height="92" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="327" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">② 怎么传播</text>
  <text x="327" y="252" text-anchor="middle" font-size="12" fill="#374151">推 还是 拉</text>
  <text x="327" y="271" text-anchor="middle" font-size="11" fill="#374151">主推送 / 副本拉取</text>
  <text x="327" y="289" text-anchor="middle" font-size="11" fill="#6B7280">Redis推 · MySQL拉 · Kafka拉</text>

  <!-- 子问题3：传播到什么程度 -->
  <rect x="403" y="206" width="180" height="92" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="493" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">③ 到什么程度</text>
  <text x="493" y="252" text-anchor="middle" font-size="12" fill="#374151">一致性强度</text>
  <text x="493" y="271" text-anchor="middle" font-size="11" fill="#374151">最终一致 / 强一致 / 可调</text>
  <text x="493" y="289" text-anchor="middle" font-size="11" fill="#6B7280">一致性 = 延迟的函数</text>

  <!-- 子问题4：断了怎么办 -->
  <rect x="570" y="206" width="180" height="92" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="660" y="230" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">④ 断了怎么办</text>
  <text x="660" y="252" text-anchor="middle" font-size="12" fill="#374151">断点续传 + 故障恢复</text>
  <text x="660" y="271" text-anchor="middle" font-size="11" fill="#374151">位点对齐 · 增量补差</text>
  <text x="660" y="289" text-anchor="middle" font-size="11" fill="#6B7280">兜底：全量同步</text>

  <!-- 底层主线：状态机复制 -->
  <line x1="410" y1="298" x2="410" y2="328" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <rect x="210" y="332" width="400" height="76" rx="6" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.8"/>
  <text x="410" y="356" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">底层主线：状态机复制</text>
  <text x="410" y="378" text-anchor="middle" font-size="12" fill="#374151">若每个副本按相同顺序执行相同输入序列</text>
  <text x="410" y="396" text-anchor="middle" font-size="12" fill="#374151">最终状态必然相同 — 三家差异只在"序列载体"与"执行方式"</text>

  <!-- 底注 -->
  <text x="410" y="438" text-anchor="middle" font-size="12" fill="#6B7280">这四个子问题构成本章全篇的分析骨架</text>
</svg>
