<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 540" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="430" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Redis 复制积压缓冲区与 replication offset</text>
  <text x="430" y="54" text-anchor="middle" font-size="13" fill="#374151">backlog 是一个固定大小的环形缓冲；主从各持一份字节进度坐标（offset），重连时比对两坐标的差</text>

  <!-- ============ 主节点侧 backlog 环形缓冲 ============ -->
  <text x="430" y="88" text-anchor="middle" font-size="14" font-weight="700" fill="#4F46E5">主节点 Master · 复制积压缓冲区（backlog，默认约 1MB）</text>

  <!-- 环形缓冲：8 格 -->
  <g transform="translate(80,108)">
    <!-- 8 个格子，环形排列 -->
    <rect x="0" y="40" width="80" height="56" rx="4" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="40" y="64" text-anchor="middle" font-size="11" fill="#374151">cmd A</text>
    <text x="40" y="82" text-anchor="middle" font-size="10" fill="#6B7280">off=100</text>

    <rect x="84" y="40" width="80" height="56" rx="4" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="124" y="64" text-anchor="middle" font-size="11" fill="#374151">cmd B</text>
    <text x="124" y="82" text-anchor="middle" font-size="10" fill="#6B7280">off=160</text>

    <rect x="168" y="40" width="80" height="56" rx="4" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
    <text x="208" y="64" text-anchor="middle" font-size="11" fill="#374151">cmd C</text>
    <text x="208" y="82" text-anchor="middle" font-size="10" fill="#6B7280">off=220</text>

    <rect x="252" y="40" width="80" height="56" rx="4" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.8"/>
    <text x="292" y="64" text-anchor="middle" font-size="11" fill="#111827">cmd D（新写）</text>
    <text x="292" y="82" text-anchor="middle" font-size="10" fill="#6B7280">off=280</text>

    <rect x="336" y="40" width="80" height="56" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="376" y="64" text-anchor="middle" font-size="11" fill="#6B7280">…（环形回绕）…</text>
    <text x="376" y="82" text-anchor="middle" font-size="10" fill="#6B7280">off=340</text>

    <rect x="420" y="40" width="80" height="56" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="460" y="64" text-anchor="middle" font-size="11" fill="#6B7280">cmd</text>
    <text x="460" y="82" text-anchor="middle" font-size="10" fill="#6B7280">off=400</text>

    <rect x="504" y="40" width="80" height="56" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="544" y="64" text-anchor="middle" font-size="11" fill="#6B7280">cmd</text>
    <text x="544" y="82" text-anchor="middle" font-size="10" fill="#6B7280">off=460</text>

    <rect x="588" y="40" width="80" height="56" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="628" y="64" text-anchor="middle" font-size="11" fill="#6B7280">cmd</text>
    <text x="628" y="82" text-anchor="middle" font-size="10" fill="#6B7280">off=520</text>

    <!-- 环形回绕弧线（从右端到左端） -->
    <path d="M 670 60 Q 740 60 740 20 Q 740 0 40 0 Q 0 0 0 30" fill="none" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="745" y="30" font-size="10" fill="#6B7280">回绕</text>

    <!-- 主 offset 指针 -->
    <line x1="292" y1="100" x2="292" y2="120" stroke="#EF4444" stroke-width="2"/>
    <polygon points="286,118 298,118 292,128" fill="#EF4444"/>
    <text x="300" y="135" font-size="12" font-weight="700" fill="#EF4444">主 master_repl_offset = 280</text>
  </g>

  <!-- ============ 从节点侧 offset ============ -->
  <text x="430" y="278" text-anchor="middle" font-size="14" font-weight="700" fill="#4F46E5">从节点 Replica · 记录自己已同步到的字节进度</text>

  <rect x="180" y="296" width="500" height="56" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="430" y="318" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">从节点本地的复制进度坐标</text>
  <text x="430" y="338" text-anchor="middle" font-size="13" fill="#EF4444" font-weight="700">replica offset = 160（断线前同步到 cmd B）</text>

  <!-- ============ 比对与结论 ============ -->
  <line x1="430" y1="352" x2="430" y2="380" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrowRed)"/>

  <rect x="100" y="386" width="660" height="120" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="430" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">重连时比对：主 offset 280 − 从 offset 160 = 差额 120 字节</text>

  <text x="120" y="438" font-size="12.5" fill="#374151">① 若差额落在 backlog 窗口内（280−520） → cmd B 之后的 cmd C、cmd D 仍在缓冲</text>
  <text x="120" y="458" font-size="12.5" font-weight="700" fill="#059669">     ⇒ 走部分重同步：只补发差额命令，主节点不 fork</text>

  <text x="120" y="484" font-size="12.5" fill="#374151">② 若从 offset 已被环形覆盖（落在窗口外） → 所需命令已被新命令挤出 backlog</text>
  <text x="120" y="504" font-size="12.5" font-weight="700" fill="#EF4444">     ⇒ 退回全量同步：fork RDB + 全量传输</text>

  <!-- 底注 -->
  <text x="430" y="528" text-anchor="middle" font-size="11.5" fill="#6B7280">offset 是字节坐标，而非命令序号 — 这让比对只依赖"窗口长度"，与具体命令大小无关</text>
</svg>
