<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 600" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <text x="440" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 3-4　InnoDB 崩溃恢复时序</text>

  <!-- Lifelines: InnoDB 启动流程 | redo log(redo) | 缓冲池(Buffer Pool) | 回滚日志(undo) -->
  <!-- Header boxes -->
  <rect x="40" y="64" width="180" height="40" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="130" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">InnoDB 启动恢复流程</text>

  <rect x="260" y="64" width="160" height="40" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="340" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">redo log</text>

  <rect x="460" y="64" width="160" height="40" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="540" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">缓冲池 Buffer Pool</text>

  <rect x="660" y="64" width="180" height="40" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="750" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">回滚日志 undo log</text>

  <!-- Lifelines (dashed vertical) -->
  <line x1="130" y1="104" x2="130" y2="540" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="340" y1="104" x2="340" y2="540" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="540" y1="104" x2="540" y2="540" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="750" y1="104" x2="750" y2="540" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Step 1: 读 checkpoint LSN -->
  <rect x="40" y="124" width="180" height="40" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="130" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">① 读 checkpoint LSN</text>
  <text x="130" y="158" text-anchor="middle" font-size="11" fill="#374151">（上次完整落盘的位点）</text>
  <path d="M130 164 L335 164" fill="none" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Step 2: 从 LSN 扫描 redo log -->
  <rect x="250" y="184" width="180" height="40" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="340" y="202" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">② 从 LSN 扫描 redo</text>
  <text x="340" y="218" text-anchor="middle" font-size="11" fill="#374151">收集未落盘的页修改</text>
  <path d="M340 224 L535 224" fill="none" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowR)"/>

  <!-- Step 3: 重放到 Buffer Pool -->
  <rect x="450" y="244" width="180" height="40" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="540" y="262" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">③ 重放页修改（roll forward）</text>
  <text x="540" y="278" text-anchor="middle" font-size="11" fill="#374151">无差别补回所有页修改（含未提交）</text>
  <path d="M540 284 L745 284" fill="none" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Step 4: undo 回滚未提交事务 -->
  <rect x="660" y="304" width="180" height="40" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="750" y="322" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">④ 用 undo 回滚</text>
  <text x="750" y="338" text-anchor="middle" font-size="11" fill="#374151">未提交事务全部撤销</text>
  <path d="M750 344 L545 344" fill="none" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowR)"/>

  <!-- Step 5: 恢复出一致性 -->
  <rect x="450" y="364" width="180" height="40" rx="4" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="540" y="382" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">⑤ 恢复出事务一致性</text>
  <text x="540" y="398" text-anchor="middle" font-size="11" fill="#374151">已提交保留 · 未提交回滚</text>
  <path d="M540 404 L135 404" fill="none" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Step 6: 可服务 -->
  <rect x="40" y="424" width="180" height="40" rx="4" fill="#ECFDF5" stroke="#059669" stroke-width="1.2"/>
  <text x="130" y="442" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">⑥ mysqld ready</text>
  <text x="130" y="458" text-anchor="middle" font-size="11" fill="#374151">ready for connections</text>

  <!-- Legend / takeaway -->
  <rect x="40" y="490" width="800" height="92" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2"/>
  <text x="60" y="514" font-size="13" font-weight="700" fill="#111827">为什么 MySQL 启动比 Redis 慢</text>
  <text x="60" y="536" font-size="12" fill="#374151">崩溃恢复分两步：redo 重放（roll forward）先无差别补回所有页修改，恢复出崩溃瞬间的物理页状态；</text>
  <text x="60" y="554" font-size="12" fill="#374151">undo 回滚（roll back）再根据提交状态撤掉未提交事务，恢复出严格的 ACID 中 A（原子性）与 D（持久性）。</text>
  <text x="60" y="572" font-size="12" fill="#374151">红色箭头 = 数据恢复 / 回滚的数据流方向。</text>
</svg>
