<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow-3-6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-red-3-6" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 4-6　存储层次访问延迟的数量级（对数轴）</text>
  <text x="440" y="52" text-anchor="middle" font-size="12" fill="#6B7280">横轴每格放大 10 倍，内存与磁盘之间隔着 6～7 个数量级</text>

  <!-- ============ 绘图区参数 ============
       X 轴起点 x0 = 240，终点 x1 = 820（宽 580）
       对数刻度：1ns 在 x0，10ms(=10,000,000ns) 在 x1
       跨 7 个 10 倍刻度 → 每格 580/7 ≈ 82.857
       log10(value) -> x = x0 + (log10(value) - 0) / 7 * 580
  -->

  <!-- 对数刻度网格线（每 10 倍一条） -->
  <g stroke="#E5E7EB" stroke-width="1">
    <line x1="240"   y1="100" x2="240"   y2="430"/>
    <line x1="322.9" y1="100" x2="322.9" y2="430"/>
    <line x1="405.7" y1="100" x2="405.7" y2="430"/>
    <line x1="488.6" y1="100" x2="488.6" y2="430"/>
    <line x1="571.4" y1="100" x2="571.4" y2="430"/>
    <line x1="654.3" y1="100" x2="654.3" y2="430"/>
    <line x1="737.1" y1="100" x2="737.1" y2="430"/>
    <line x1="820"   y1="100" x2="820"   y2="430"/>
  </g>

  <!-- X 轴底线 -->
  <line x1="240" y1="430" x2="820" y2="430" stroke="#374151" stroke-width="1.5"/>

  <!-- X 轴刻度标签 -->
  <g font-size="11" fill="#6B7280" text-anchor="middle">
    <text x="240"   y="448">1 ns</text>
    <text x="322.9" y="448">10 ns</text>
    <text x="405.7" y="448">100 ns</text>
    <text x="488.6" y="448">1 μs</text>
    <text x="571.4" y="448">10 μs</text>
    <text x="654.3" y="448">100 μs</text>
    <text x="737.1" y="448">1 ms</text>
    <text x="820"   y="448">10 ms</text>
  </g>
  <text x="530" y="472" text-anchor="middle" font-size="12" fill="#374151">典型访问延迟（对数轴，每格 ×10）</text>

  <!-- ============ 5 条横向柱 ============
       柱高 36，间距 18；首柱 y=112
       1: L1/L2   ~1 ns      -> x 终点 240
       2: 主内存   ~100 ns    -> log10(100)=2 -> 240 + 2/7*580 = 405.7
       3: SSD顺序 ~1000 ns   -> log10(1000)=3 -> 240 + 3/7*580 = 488.6  [红色高亮]
       4: SSD随机 ~100000 ns -> log10(1e5)=5  -> 240 + 5/7*580 = 654.3  [红色高亮]
       5: 机械盘   ~1e7 ns    -> log10(1e7)=7  -> 820
  -->

  <!-- 柱 1: L1/L2 缓存 -->
  <text x="230" y="135" text-anchor="end" font-size="12.5" font-weight="600" fill="#111827">L1 / L2 缓存</text>
  <text x="230" y="150" text-anchor="end" font-size="11" fill="#6B7280">CPU 片内 · ~1 ns</text>
  <rect x="240" y="124" width="0.1" height="32" fill="#4F46E5" opacity="0.85"/>
  <circle cx="240" cy="140" r="4" fill="#4F46E5"/>
  <text x="252" y="144" font-size="11.5" font-weight="600" fill="#4F46E5">1 ns</text>

  <!-- 柱 2: 主内存 -->
  <text x="230" y="185" text-anchor="end" font-size="12.5" font-weight="600" fill="#111827">主内存访问</text>
  <text x="230" y="200" text-anchor="end" font-size="11" fill="#6B7280">DRAM · ~100 ns</text>
  <rect x="240" y="174" width="165.7" height="32" fill="#4F46E5" opacity="0.85"/>
  <text x="415" y="194" font-size="11.5" font-weight="600" fill="#4F46E5">100 ns</text>

  <!-- 柱 3: SSD 顺序读（红色高亮） -->
  <text x="230" y="235" text-anchor="end" font-size="12.5" font-weight="600" fill="#111827">SSD 顺序读</text>
  <text x="230" y="250" text-anchor="end" font-size="11" fill="#6B7280">顺序 · ~1 μs</text>
  <rect x="240" y="224" width="248.6" height="32" fill="#EF4444" opacity="0.85"/>
  <text x="498" y="244" font-size="11.5" font-weight="600" fill="#EF4444">1 μs (1,000 ns)</text>

  <!-- 柱 4: SSD 随机读（红色高亮） -->
  <text x="230" y="285" text-anchor="end" font-size="12.5" font-weight="600" fill="#111827">SSD 随机读</text>
  <text x="230" y="300" text-anchor="end" font-size="11" fill="#6B7280">随机 · ~100 μs</text>
  <rect x="240" y="274" width="414.3" height="32" fill="#EF4444" opacity="0.85"/>
  <text x="664" y="294" font-size="11.5" font-weight="600" fill="#EF4444">100 μs (100,000 ns)</text>

  <!-- 柱 5: 机械盘寻道 -->
  <text x="230" y="335" text-anchor="end" font-size="12.5" font-weight="600" fill="#111827">机械盘寻道</text>
  <text x="230" y="350" text-anchor="end" font-size="11" fill="#6B7280">随机 · ~10 ms</text>
  <rect x="240" y="324" width="580" height="32" fill="#D97706" opacity="0.85"/>
  <text x="830" y="344" font-size="11.5" font-weight="600" fill="#D97706" text-anchor="end">10 ms (10,000,000 ns)</text>

  <!-- ============ 红色高亮：顺序 vs 随机 100× 标注 ============ -->
  <!-- 在 SSD 顺序柱（y=240）与随机柱（y=290）之间画大括号式标注 -->
  <line x1="500" y1="240" x2="660" y2="240" stroke="#EF4444" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.6"/>
  <line x1="660" y1="240" x2="660" y2="290" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrow-red-3-6)" marker-start="url(#arrow-red-3-6)"/>
  <rect x="538" y="256" width="244" height="22" rx="4" fill="#FEE2E2" stroke="#EF4444" stroke-width="1"/>
  <text x="660" y="271" text-anchor="middle" font-size="11.5" font-weight="700" fill="#EF4444">同介质：顺序比随机快 100×</text>

  <!-- 红字结论（柱状图右侧空白处） -->
  <rect x="540" y="372" width="290" height="42" rx="5" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.2"/>
  <text x="685" y="389" text-anchor="middle" font-size="11.5" font-weight="700" fill="#EF4444">Kafka 死磕「顺序写」的根因</text>
  <text x="685" y="406" text-anchor="middle" font-size="10.5" fill="#374151">把随机变顺序，等于白捡两个数量级</text>

  <!-- ============ 内存 vs 机械盘 跨度标注 ============ -->
  <!-- 在主内存柱（y=190）与机械盘柱（y=340）之间画纵向跨度线 -->
  <line x1="225" y1="190" x2="225" y2="340" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow-3-6)" marker-start="url(#arrow-3-6)"/>
  <rect x="40" y="372" width="178" height="42" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.2"/>
  <text x="129" y="389" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">内存比机械盘快</text>
  <text x="129" y="406" text-anchor="middle" font-size="11.5" font-weight="700" fill="#EF4444">约 1,000 万倍（10⁷）</text>

  <!-- 左侧分组提示：内存 vs 磁盘 -->
  <text x="36" y="112" font-size="11" font-weight="700" fill="#4F46E5">┃ 内存</text>
  <text x="36" y="320" font-size="11" font-weight="700" fill="#D97706">┃ 磁盘</text>

  <!-- 底部图注 -->
  <text x="440" y="500" text-anchor="middle" font-size="12" fill="#374151">数据为典型量级估值；实际值因硬件、负载、队列深度而异，但数量级关系稳定。</text>
  <text x="440" y="520" text-anchor="middle" font-size="11.5" font-style="italic" fill="#6B7280">对数轴上「等长」不等于「等比」，每一格都是 10 倍差距</text>
</svg>
