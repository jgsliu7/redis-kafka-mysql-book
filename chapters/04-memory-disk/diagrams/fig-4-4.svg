<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 760" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowInd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#D97706"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 4-4　MySQL 一次写操作的全链路时序</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#374151">WAL（先写重做日志）→ 改缓冲池脏页 → 提交 → 双写缓冲 → Checkpoint 刷盘</text>

  <!-- Lifelines (actors) -->
  <!-- Client -->
  <rect x="40" y="90" width="120" height="40" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="100" y="115" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">客户端</text>
  <line x1="100" y1="130" x2="100" y2="700" stroke="#6B7280" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- InnoDB -->
  <rect x="220" y="90" width="140" height="40" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="290" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">InnoDB 引擎</text>
  <text x="290" y="124" text-anchor="middle" font-size="10" fill="#374151">事务执行</text>
  <line x1="290" y1="130" x2="290" y2="700" stroke="#D97706" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Buffer Pool -->
  <rect x="420" y="90" width="140" height="40" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="490" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">缓冲池</text>
  <text x="490" y="124" text-anchor="middle" font-size="10" fill="#374151">Buffer Pool</text>
  <line x1="490" y1="130" x2="490" y2="700" stroke="#D97706" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Redo Log -->
  <rect x="620" y="90" width="140" height="40" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="690" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">重做日志</text>
  <text x="690" y="124" text-anchor="middle" font-size="10" fill="#374151">redo log（顺序写）</text>
  <line x1="690" y1="130" x2="690" y2="700" stroke="#D97706" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Disk -->
  <rect x="820" y="90" width="120" height="40" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="880" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">磁盘</text>
  <text x="880" y="124" text-anchor="middle" font-size="10" fill="#374151">表空间文件</text>
  <line x1="880" y1="130" x2="880" y2="700" stroke="#6B7280" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- ===== Messages ===== -->
  <!-- 1. UPDATE request -->
  <line x1="100" y1="160" x2="284" y2="160" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="192" y="153" text-anchor="middle" font-size="11" fill="#374151">① UPDATE 请求</text>

  <!-- 2. WAL: write redo log FIRST -->
  <line x1="290" y1="200" x2="684" y2="200" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <text x="487" y="193" text-anchor="middle" font-size="11" fill="#EF4444" font-weight="700">② 先写重做日志（WAL，顺序写）</text>
  <text x="487" y="216" text-anchor="middle" font-size="10" fill="#374151">「这页要怎么改」先落盘，崩溃后可重放</text>

  <!-- 3. modify buffer pool page (in memory) -->
  <line x1="290" y1="250" x2="484" y2="250" stroke="#D97706" stroke-width="1.6" marker-end="url(#arrowInd)"/>
  <text x="387" y="243" text-anchor="middle" font-size="11" fill="#374151">③ 改缓冲池中的页 → 标记为脏页</text>

  <!-- note: redo flushed (innodb_flush_log_at_trx_commit) -->
  <rect x="600" y="270" width="180" height="34" rx="4" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2"/>
  <text x="690" y="285" text-anchor="middle" font-size="10" fill="#374151">innodb_flush_log_at_trx_commit</text>
  <text x="690" y="299" text-anchor="middle" font-size="10" fill="#374151">=1 提交即落盘（默认）</text>
  <line x1="690" y1="304" x2="876" y2="304" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>
  <text x="783" y="298" text-anchor="middle" font-size="10" fill="#EF4444">落盘</text>

  <!-- 4. COMMIT -->
  <line x1="284" y1="340" x2="100" y2="340" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow)" stroke-dasharray="5,3"/>
  <text x="192" y="333" text-anchor="middle" font-size="11" fill="#374151">④ 返回提交成功（重做日志已落盘 → 持久化达成）</text>

  <!-- Divider -->
  <line x1="40" y1="370" x2="940" y2="370" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="490" y="386" text-anchor="middle" font-size="11" fill="#6B7280">── 提交后，脏页仍在内存，由后台线程异步刷盘 ──</text>

  <!-- 5. Double Write Buffer -->
  <rect x="420" y="410" width="460" height="56" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="650" y="432" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">⑤ 双写缓冲（Double Write Buffer）</text>
  <text x="650" y="452" text-anchor="middle" font-size="11" fill="#374151">脏页先顺序写到独立双写文件（8.0.20+，#ib_*.dblwr），再写到表空间</text>

  <!-- arrow buffer -> double write -->
  <line x1="490" y1="408" x2="490" y2="408" stroke="#D97706" stroke-width="1.4"/>

  <!-- 6. double write to disk -->
  <line x1="876" y1="466" x2="880" y2="500" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>
  <text x="888" y="486" font-size="10" fill="#EF4444">半页损坏免疫</text>

  <!-- 7. Checkpoint flush dirty pages -->
  <rect x="420" y="510" width="460" height="50" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="650" y="532" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">⑥ Checkpoint：按 Flush List 顺序刷脏页</text>
  <text x="650" y="550" text-anchor="middle" font-size="11" fill="#374151">后台线程依「最早修改时间」排队，批量顺序写回</text>

  <!-- arrow checkpoint to disk -->
  <line x1="876" y1="560" x2="880" y2="592" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrowRed)"/>
  <text x="918" y="580" font-size="10" fill="#EF4444">刷盘</text>

  <!-- 8. Crash recovery note -->
  <rect x="40" y="612" width="880" height="76" rx="6" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.2"/>
  <text x="60" y="634" font-size="13" font-weight="700" fill="#111827">崩溃恢复（重启时）</text>
  <text x="60" y="656" font-size="12" fill="#374151">重做日志已落盘的修改，重放补回未刷盘的脏页；半页损坏从双写缓冲区还原。</text>
  <text x="60" y="676" font-size="11" fill="#6B7280">核心：随机写数据页慢且易损坏 → 用顺序日志保住可靠与速度。</text>

  <!-- legend -->
  <g transform="translate(40,705)">
    <line x1="0" y1="8" x2="28" y2="8" stroke="#4B5563" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="36" y="12" font-size="10" fill="#374151">控制流</text>
    <line x1="110" y1="8" x2="138" y2="8" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrowRed)"/>
    <text x="146" y="12" font-size="10" fill="#374151">数据/落盘</text>
    <line x1="240" y1="8" x2="268" y2="8" stroke="#D97706" stroke-width="1.8" marker-end="url(#arrowInd)"/>
    <text x="276" y="12" font-size="10" fill="#374151">内存操作</text>
    <rect x="370" y="1" width="12" height="14" rx="2" fill="#FEF3C7" stroke="#D97706"/>
    <text x="388" y="12" font-size="10" fill="#374151">MySQL 相关</text>
  </g>
</svg>
