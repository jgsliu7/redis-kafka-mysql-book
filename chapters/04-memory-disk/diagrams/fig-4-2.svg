<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 640" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 4-2　Redis 持久化数据流</text>
  <text x="460" y="58" text-anchor="middle" font-size="13" fill="#374151">写命令通往内存与 RDB 快照 / AOF（含混合持久化）两类持久化产物</text>

  <!-- Client -->
  <rect x="60" y="100" width="120" height="56" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="120" y="134" text-anchor="middle" font-size="14" fill="#111827">客户端</text>
  <text x="120" y="150" text-anchor="middle" font-size="11" fill="#374151">SET key val</text>

  <!-- Redis Main Process (Memory) -->
  <rect x="320" y="92" width="200" height="72" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.8"/>
  <text x="420" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">Redis 主进程</text>
  <text x="420" y="138" text-anchor="middle" font-size="12" fill="#374151">内存数据结构</text>
  <text x="420" y="154" text-anchor="middle" font-size="11" fill="#374151">（哈希表 / 跳表 / 压缩列表）</text>

  <!-- arrow client -> redis -->
  <line x1="180" y1="128" x2="316" y2="128" stroke="#4B5563" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- Branch label -->
  <text x="545" y="156" font-size="12" fill="#374151">同时触发持久化 ↓</text>

  <!-- Three paths: RDB / AOF / 混合 -->
  <!-- RDB -->
  <rect x="60" y="250" width="240" height="160" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.6"/>
  <text x="180" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">RDB（快照文件）</text>
  <line x1="80" y1="288" x2="280" y2="288" stroke="#C7D2FE" stroke-width="1"/>
  <text x="80" y="308" font-size="12" fill="#374151">• fork 子进程 + COW 写时复制</text>
  <text x="80" y="328" font-size="12" fill="#374151">• 某一时刻全量快照</text>
  <text x="80" y="348" font-size="12" fill="#374151">• 二进制紧凑，恢复快</text>
  <text x="80" y="368" font-size="12" fill="#374151">• fork 大实例可能阻塞数百毫秒</text>
  <text x="80" y="392" font-size="11" fill="#6B7280">产物：dump.rdb</text>

  <!-- AOF -->
  <rect x="340" y="250" width="240" height="160" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.6"/>
  <text x="460" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">AOF（仅追加文件）</text>
  <line x1="360" y1="288" x2="560" y2="288" stroke="#C7D2FE" stroke-width="1"/>
  <text x="360" y="308" font-size="12" fill="#374151">• 追加写命令日志</text>
  <text x="360" y="328" font-size="12" fill="#374151">• appendfsync 三档：</text>
  <text x="360" y="346" font-size="11" fill="#374151">　always / everysec(默认) / no</text>
  <text x="360" y="368" font-size="12" fill="#374151">• 重写：按当前内存重生成</text>
  <text x="360" y="392" font-size="11" fill="#6B7280">产物：appendonlydir/（7.x 多部 AOF）</text>

  <!-- 混合 -->
  <rect x="620" y="250" width="240" height="160" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="740" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">混合持久化（4.0+，推荐）</text>
  <line x1="640" y1="288" x2="840" y2="288" stroke="#C7D2FE" stroke-width="1"/>
  <text x="640" y="308" font-size="12" fill="#374151">• base = RDB 全量快照</text>
  <text x="640" y="326" font-size="12" fill="#374151">　+ incr = AOF 增量命令</text>
  <text x="640" y="348" font-size="12" fill="#374151">• 恢复快、丢失少</text>
  <text x="640" y="368" font-size="12" fill="#374151">• 7.0+ base 始终为 RDB（行为等效）</text>
  <text x="640" y="392" font-size="11" fill="#6B7280">产物：appendonlydir/（base + incr）</text>

  <!-- arrows from redis to three paths -->
  <path d="M 380 164 Q 380 210 180 246" fill="none" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 420 164 L 420 246" fill="none" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M 460 164 Q 460 210 660 246" fill="none" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Branch labels -->
  <text x="200" y="220" font-size="11" fill="#374151" text-anchor="middle">触发 BGSAVE / 定时</text>
  <text x="436" y="220" font-size="11" fill="#374151">每条命令</text>
  <text x="680" y="220" font-size="11" fill="#374151">BGREWRITEAOF 触发</text>

  <!-- Disk -->
  <rect x="260" y="470" width="400" height="60" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.6"/>
  <text x="460" y="498" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">磁盘（落盘）</text>
  <text x="460" y="518" text-anchor="middle" font-size="12" fill="#374151">崩溃后用于恢复内存</text>

  <!-- arrows to disk -->
  <path d="M 180 412 L 320 466" fill="none" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>
  <path d="M 460 412 L 460 466" fill="none" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>
  <path d="M 740 412 L 600 466" fill="none" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>

  <!-- Legend -->
  <g transform="translate(60,560)">
    <line x1="0" y1="10" x2="28" y2="10" stroke="#4B5563" stroke-width="1.8" marker-end="url(#arrow)"/>
    <text x="36" y="14" font-size="11" fill="#374151">控制流 / 触发</text>
    <line x1="160" y1="10" x2="188" y2="10" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrowRed)"/>
    <text x="196" y="14" font-size="11" fill="#374151">数据落盘</text>
    <rect x="300" y="2" width="14" height="14" rx="2" fill="#EEF2FF" stroke="#4F46E5"/>
    <text x="320" y="14" font-size="11" fill="#374151">Redis 相关</text>
  </g>
</svg>
