<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 660" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowInd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="470" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 4-2　Redis 近似 LRU 采样淘汰与 LFU 计数器衰减</text>
  <text x="470" y="56" text-anchor="middle" font-size="13" fill="#374151">LRU 看时间（采样池内淘汰最久未用）·LFU 看频率（Morris 近似计数器 + 衰减）</text>

  <!-- ===== Left half: Approximate LRU ===== -->
  <text x="220" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#4F46E5">近似 LRU（随机采样淘汰）</text>

  <!-- Global key pool -->
  <rect x="40" y="115" width="380" height="180" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.4" stroke-dasharray="5,3"/>
  <text x="60" y="135" font-size="12" fill="#374151">全部键（哈希表）</text>

  <!-- key boxes -->
  <g font-size="11" fill="#111827">
    <rect x="60" y="150" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="83" y="168" text-anchor="middle">k1</text>
    <rect x="112" y="150" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="135" y="168" text-anchor="middle">k2</text>
    <rect x="164" y="150" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="187" y="168" text-anchor="middle">k3</text>
    <rect x="216" y="150" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="239" y="168" text-anchor="middle">k4</text>
    <rect x="268" y="150" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="291" y="168" text-anchor="middle">k5</text>
    <rect x="320" y="150" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="343" y="168" text-anchor="middle">k6</text>
    <rect x="60" y="186" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="83" y="204" text-anchor="middle">k7</text>
    <rect x="112" y="186" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="135" y="204" text-anchor="middle">k8</text>
    <rect x="164" y="186" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="187" y="204" text-anchor="middle">k9</text>
    <rect x="216" y="186" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="239" y="204" text-anchor="middle">k10</text>
    <rect x="268" y="186" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="291" y="204" text-anchor="middle">k11</text>
    <rect x="320" y="186" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="343" y="204" text-anchor="middle">k12</text>
    <rect x="60" y="222" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="83" y="240" text-anchor="middle">k13</text>
    <rect x="112" y="222" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="135" y="240" text-anchor="middle">k14</text>
    <rect x="164" y="222" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="187" y="240" text-anchor="middle">k15</text>
    <rect x="216" y="222" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="239" y="240" text-anchor="middle">k16</text>
    <rect x="268" y="222" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="291" y="240" text-anchor="middle">...</text>
    <rect x="320" y="222" width="46" height="28" rx="4" fill="#EEF2FF" stroke="#4F46E5"/><text x="343" y="240" text-anchor="middle">kN</text>
  </g>
  <text x="60" y="275" font-size="11" fill="#6B7280">维护教科书双向链表代价大 → Redis 不维护全局链表</text>

  <!-- sample box -->
  <rect x="40" y="315" width="380" height="70" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="60" y="338" font-size="13" font-weight="700" fill="#111827">采样池（maxmemory-samples，默认 5）</text>
  <g font-size="11" fill="#111827">
    <rect x="60" y="350" width="46" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="83" y="368" text-anchor="middle">k3</text>
    <rect x="112" y="350" width="46" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="135" y="368" text-anchor="middle">k7</text>
    <rect x="164" y="350" width="46" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="187" y="368" text-anchor="middle">k11</text>
    <rect x="216" y="350" width="46" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="239" y="368" text-anchor="middle">k2</text>
    <rect x="268" y="350" width="46" height="28" rx="4" fill="#FFFFFF" stroke="#D97706"/><text x="291" y="368" text-anchor="middle">k9</text>
  </g>

  <!-- arrows: random pick（从键池底下到采样池顶，避开键池说明文字与采样池标题） -->
  <path d="M 83 295 L 83 315" fill="none" stroke="#4F46E5" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#arrowInd)"/>
  <path d="M 239 295 L 239 315" fill="none" stroke="#4F46E5" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#arrowInd)"/>
  <text x="425" y="358" font-size="11" fill="#374151">← 随机抽 N 个</text>

  <!-- evict -->
  <rect x="40" y="410" width="380" height="76" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.8"/>
  <text x="60" y="432" font-size="13" font-weight="700" fill="#111827">淘汰：采样池中空闲时间最大者</text>
  <rect x="60" y="444" width="120" height="30" rx="4" fill="#FFFFFF" stroke="#EF4444" stroke-width="1.6"/>
  <text x="120" y="463" text-anchor="middle" font-size="12" fill="#EF4444" font-weight="700">k11 (最久未用)</text>
  <text x="195" y="463" font-size="11" fill="#374151">→ DEL 释放内存</text>
  <path d="M 187 380 L 120 406" fill="none" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>

  <text x="220" y="510" text-anchor="middle" font-size="11" fill="#6B7280">精度换性能：采样数越大越接近真 LRU，但每次淘汰成本越高</text>

  <!-- ===== Right half: LFU Morris counter ===== -->
  <text x="720" y="96" text-anchor="middle" font-size="15" font-weight="700" fill="#4F46E5">LFU（Morris 近似计数器 + 衰减）</text>

  <!-- redisObject header -->
  <rect x="540" y="115" width="380" height="170" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.6"/>
  <text x="560" y="135" font-size="13" font-weight="700" fill="#111827">redisObject.lru 字段（24 bit）</text>
  <line x1="540" y1="144" x2="920" y2="144" stroke="#C7D2FE" stroke-width="1"/>

  <!-- counter bits -->
  <rect x="560" y="158" width="150" height="48" rx="4" fill="#FFFFFF" stroke="#4F46E5"/>
  <text x="635" y="178" text-anchor="middle" font-size="12" fill="#111827">高 8 位</text>
  <text x="635" y="196" text-anchor="middle" font-size="11" fill="#374151">Morris 对数计数器</text>

  <rect x="710" y="158" width="150" height="48" rx="4" fill="#FFFFFF" stroke="#4F46E5"/>
  <text x="785" y="178" text-anchor="middle" font-size="12" fill="#111827">低 16 位</text>
  <text x="785" y="196" text-anchor="middle" font-size="11" fill="#374151">上次访问时间（分钟）</text>

  <!-- counter value -->
  <text x="560" y="232" font-size="12" fill="#374151">计数器值 = log₂(实际访问次数)，以概率递增方式 +1</text>
  <text x="560" y="252" font-size="12" fill="#374151">8 位可表达 0~255，足以覆盖千万级访问</text>
  <text x="560" y="272" font-size="11" fill="#6B7280">lfu-log-factor（默认 10）控制计数增长斜率</text>

  <!-- access increment -->
  <rect x="540" y="305" width="180" height="64" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="630" y="328" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">每次访问</text>
  <text x="630" y="346" text-anchor="middle" font-size="11" fill="#374151">按概率递增计数</text>
  <text x="630" y="362" text-anchor="middle" font-size="11" fill="#374151">（越大概率越小）</text>

  <!-- decay -->
  <rect x="740" y="305" width="180" height="64" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="830" y="328" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">周期性衰减</text>
  <text x="830" y="346" text-anchor="middle" font-size="11" fill="#374151">超过 lfu-decay-time</text>
  <text x="830" y="362" text-anchor="middle" font-size="11" fill="#374151">（默认 1）分钟则 −1</text>

  <line x1="720" y1="337" x2="736" y2="337" stroke="#4B5563" stroke-width="1.6"/>

  <!-- result: hot vs cold -->
  <rect x="540" y="395" width="180" height="64" rx="6" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.6"/>
  <text x="630" y="418" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">热数据</text>
  <text x="630" y="436" text-anchor="middle" font-size="11" fill="#374151">高频率 → 计数大</text>
  <text x="630" y="452" text-anchor="middle" font-size="11" fill="#374151">难以被淘汰</text>

  <rect x="740" y="395" width="180" height="64" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.6"/>
  <text x="830" y="418" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">扫描来的冷数据</text>
  <text x="830" y="436" text-anchor="middle" font-size="11" fill="#374151">访问一次 → 计数小</text>
  <text x="830" y="452" text-anchor="middle" font-size="11" fill="#374151">优先被淘汰</text>

  <text x="720" y="486" text-anchor="middle" font-size="11" fill="#6B7280">解决 LRU「扫描一次冷数据挤掉热数据」的痛点</text>

  <!-- bottom: essence comparison -->
  <rect x="40" y="540" width="880" height="90" rx="6" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.2"/>
  <text x="60" y="564" font-size="13" font-weight="700" fill="#111827">本质差异</text>
  <text x="60" y="586" font-size="12" fill="#374151">LRU 看时间：谁最久没被访问就淘汰谁（采样近似实现）。</text>
  <text x="60" y="606" font-size="12" fill="#374151">LFU 看频率：谁访问得少就淘汰谁（Morris 计数器 + 衰减实现）。</text>
  <text x="60" y="624" font-size="11" fill="#6B7280">二者都通过「放弃精确、换回性能」达成 O(1) 淘汰决策。</text>
</svg>
