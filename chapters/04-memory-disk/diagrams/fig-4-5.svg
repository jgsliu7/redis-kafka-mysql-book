<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 740" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="480" y="34" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 4-5　Kafka 生产-存储-消费的零拷贝数据流</text>
  <text x="480" y="56" text-anchor="middle" font-size="13" fill="#374151">传统读发 4 次拷贝 + 4 次切换　vs　零拷贝（sendfile）2 次 DMA 拷贝 + 2 次切换</text>

  <!-- ===== TOP: Traditional read+send (4 copies) ===== -->
  <rect x="40" y="80" width="880" height="290" rx="8" fill="#FFFBEB" stroke="#D97706" stroke-width="1.2" stroke-dasharray="6,4"/>
  <text x="60" y="104" font-size="14" font-weight="700" fill="#D97706">传统 read() + write()：4 次拷贝 · 4 次上下文切换</text>
  <text x="60" y="122" font-size="11" fill="#374151">数据必须经过用户空间，Kafka（或应用）才能「看到」并转交 Socket</text>

  <!-- 4 buffer columns -->
  <g font-size="11" fill="#111827">
    <rect x="70" y="150" width="170" height="44" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.4"/>
    <text x="155" y="170" text-anchor="middle" font-weight="700">磁盘 / 日志段</text>
    <text x="155" y="186" text-anchor="middle" font-size="10" fill="#374151">segment .log</text>

    <rect x="290" y="150" width="170" height="44" rx="5" fill="#ECFDF5" stroke="#059669" stroke-width="1.4"/>
    <text x="375" y="170" text-anchor="middle" font-weight="700">内核缓冲</text>
    <text x="375" y="186" text-anchor="middle" font-size="10" fill="#374151">PageCache（read buffer）</text>

    <rect x="510" y="150" width="170" height="44" rx="5" fill="#FEE2E2" stroke="#EF4444" stroke-width="1.4"/>
    <text x="595" y="170" text-anchor="middle" font-weight="700">用户缓冲</text>
    <text x="595" y="186" text-anchor="middle" font-size="10" fill="#374151">Kafka 进程堆内</text>

    <rect x="730" y="150" width="170" height="44" rx="5" fill="#ECFDF5" stroke="#059669" stroke-width="1.4"/>
    <text x="815" y="170" text-anchor="middle" font-weight="700">Socket 缓冲</text>
    <text x="815" y="186" text-anchor="middle" font-size="10" fill="#374151">kernel socket</text>
  </g>

  <!-- arrows between -->
  <line x1="240" y1="172" x2="288" y2="172" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>
  <text x="264" y="165" text-anchor="middle" font-size="10" fill="#EF4444">①DMA</text>
  <line x1="460" y1="172" x2="508" y2="172" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>
  <text x="484" y="165" text-anchor="middle" font-size="10" fill="#EF4444">②CPU</text>
  <line x1="680" y1="172" x2="728" y2="172" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>
  <text x="704" y="165" text-anchor="middle" font-size="10" fill="#EF4444">③CPU</text>

  <!-- nic + switch count -->
  <rect x="730" y="220" width="170" height="40" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.4"/>
  <text x="815" y="237" text-anchor="middle" font-weight="700" font-size="11" fill="#111827">网卡</text>
  <text x="815" y="252" text-anchor="middle" font-size="10" fill="#374151">④DMA → 网络</text>
  <line x1="815" y1="194" x2="815" y2="218" stroke="#EF4444" stroke-width="1.6" marker-end="url(#arrowRed)"/>

  <!-- steps text -->
  <text x="60" y="240" font-size="11" fill="#374151">read()：内核态→用户态（切换1）</text>
  <text x="60" y="258" font-size="11" fill="#374151">　　　DMA 把数据搬进 PageCache（①）</text>
  <text x="60" y="276" font-size="11" fill="#374151">　　　CPU 拷到用户缓冲（②），用户态→内核态（切换2）</text>
  <text x="60" y="294" font-size="11" fill="#374151">write()：CPU 拷到 Socket 缓冲（③），内核态→用户态（切换3）</text>
  <text x="60" y="312" font-size="11" fill="#374151">　　　DMA 拷到网卡（④），用户态→内核态（切换4）</text>
  <text x="60" y="338" font-size="11" font-weight="700" fill="#EF4444">代价：4 次拷贝（2 CPU + 2 DMA）· 4 次上下文切换 · 2 份内存冗余</text>

  <!-- ===== BOTTOM: zero-copy sendfile (2 copies) ===== -->
  <rect x="40" y="390" width="880" height="260" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.4"/>
  <text x="60" y="414" font-size="14" font-weight="700" fill="#059669">零拷贝 sendfile() / Java NIO transferTo：2 次 DMA 拷贝 · 2 次上下文切换</text>
  <text x="60" y="432" font-size="11" fill="#374151">数据不进用户空间，Kafka 只向内核「指」一段文件范围，由内核直接发给网卡</text>

  <!-- 3 columns: disk -> pagecache -> nic -->
  <g font-size="11" fill="#111827">
    <rect x="80" y="460" width="180" height="48" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.4"/>
    <text x="170" y="481" text-anchor="middle" font-weight="700">磁盘 / 日志段</text>
    <text x="170" y="498" text-anchor="middle" font-size="10" fill="#374151">segment .log</text>

    <rect x="380" y="460" width="200" height="48" rx="5" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
    <text x="480" y="481" text-anchor="middle" font-weight="700">内核 PageCache</text>
    <text x="480" y="498" text-anchor="middle" font-size="10" fill="#374151">OS 内核唯一缓存（无用户态副本）</text>

    <rect x="700" y="460" width="180" height="48" rx="5" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.4"/>
    <text x="790" y="481" text-anchor="middle" font-weight="700">网卡 → 消费者</text>
    <text x="790" y="498" text-anchor="middle" font-size="10" fill="#374151">网络</text>
  </g>

  <!-- arrows -->
  <line x1="260" y1="484" x2="378" y2="484" stroke="#059669" stroke-width="1.8" marker-end="url(#arrowG)"/>
  <text x="319" y="476" text-anchor="middle" font-size="10" fill="#059669">①DMA 读入</text>
  <line x1="580" y1="484" x2="698" y2="484" stroke="#059669" stroke-width="1.8" marker-end="url(#arrowG)"/>
  <text x="639" y="476" text-anchor="middle" font-size="10" fill="#059669">②DMA 发出（带 gather）</text>

  <!-- Kafka process ghost (not touching data) -->
  <rect x="380" y="540" width="200" height="44" rx="5" fill="#ECFDF5" stroke="#059669" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="480" y="560" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">Kafka 进程</text>
  <text x="480" y="576" text-anchor="middle" font-size="10" fill="#374151">只调用 sendfile()，不拷贝数据</text>

  <!-- steps -->
  <text x="60" y="556" font-size="11" fill="#374151">sendfile()：用户态→内核态（切换1）</text>
  <text x="60" y="574" font-size="11" fill="#374151">　　　DMA 把数据读入 PageCache（①）</text>
  <text x="60" y="592" font-size="11" fill="#374151">　　　DMA 带 gather 直接发到网卡（②），内核态→用户态（切换2）</text>
  <text x="60" y="618" font-size="11" font-weight="700" fill="#059669">收益：拷贝数减半 · 切换数减半 · 内存冗余为零 · 消费者按内存速度读已缓存数据</text>

  <!-- caveat -->
  <rect x="40" y="664" width="880" height="60" rx="6" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.2"/>
  <text x="60" y="686" font-size="13" font-weight="700" fill="#111827">关键前提与边界</text>
  <text x="60" y="706" font-size="12" fill="#374151">零拷贝只在「消费者读已缓存在 PageCache 的数据」时生效；冷数据仍需磁盘 IO。这正是 Kafka 不自建缓冲池、依赖 OS 的核心红利。</text>
</svg>
