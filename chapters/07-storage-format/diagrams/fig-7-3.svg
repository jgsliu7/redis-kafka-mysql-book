<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 600" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <text x="460" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 7-3　AOF 重写与混合持久化的双缓冲协作</text>
  <text x="460" y="54" text-anchor="middle" font-size="13" fill="#374151">fork 子进程从内存生成新文件，rewrite buffer 收集重写期间的新写命令，完成后原子追加</text>

  <!-- ============ three lifelines ============ -->
  <!-- main process -->
  <line x1="160" y1="100" x2="160" y2="560" stroke="#4B5563" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="90" y="74" width="140" height="34" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="160" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#4F46E5">主进程</text>

  <!-- child process -->
  <line x1="470" y1="100" x2="470" y2="560" stroke="#4B5563" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="400" y="74" width="140" height="34" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="470" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#4F46E5">fork 子进程</text>

  <!-- disk -->
  <line x1="780" y1="100" x2="780" y2="560" stroke="#4B5563" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="710" y="74" width="140" height="34" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="780" y="96" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">磁盘文件</text>

  <!-- ============ steps ============ -->

  <!-- step 1: fork -->
  <line x1="170" y1="130" x2="460" y2="130" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="315" y="122" text-anchor="middle" font-size="12" fill="#111827">① BGREWRITEAOF 触发 fork（写时复制共享内存）</text>

  <!-- step 2: child reads memory, writes new aof -->
  <rect x="420" y="150" width="100" height="50" rx="4" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="470" y="172" text-anchor="middle" font-size="11" font-weight="600" fill="#4F46E5">遍历内存</text>
  <text x="470" y="190" text-anchor="middle" font-size="10" fill="#374151">生成全量命令</text>

  <line x1="480" y1="200" x2="770" y2="200" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="625" y="192" text-anchor="middle" font-size="12" fill="#111827">② 写入 temp-rewrite.aof（混合：RDB 头 + AOF 尾）</text>

  <!-- step 3: meanwhile main writes -->
  <rect x="100" y="225" width="120" height="44" rx="4" fill="#FEF2F7" stroke="#EF4444" stroke-width="1.5"/>
  <text x="160" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#EF4444">重写期间</text>
  <text x="160" y="261" text-anchor="middle" font-size="10" fill="#374151">线上新写命令到达</text>

  <!-- step 4: append to old aof + rewrite buffer (two arrows) -->
  <line x1="220" y1="290" x2="770" y2="290" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="495" y="282" text-anchor="middle" font-size="12" fill="#374151">③ 同时追加到旧 AOF（保底）</text>

  <rect x="100" y="305" width="120" height="44" rx="4" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="160" y="324" text-anchor="middle" font-size="11" font-weight="600" fill="#4F46E5">aof_rewrite</text>
  <text x="160" y="341" text-anchor="middle" font-size="11" font-weight="600" fill="#4F46E5">_buffer</text>

  <line x1="220" y1="327" x2="430" y2="327" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowR)"/>
  <text x="325" y="320" text-anchor="middle" font-size="12" fill="#EF4444">④ 缓存增量命令</text>

  <!-- step 5: child done signal -->
  <line x1="470" y1="370" x2="170" y2="370" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="320" y="362" text-anchor="middle" font-size="12" fill="#111827">⑤ 子进程完成，发信号通知主进程</text>

  <!-- step 6: flush rewrite buffer to temp file -->
  <rect x="400" y="390" width="140" height="44" rx="4" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="470" y="409" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">temp-rewrite.aof</text>
  <text x="470" y="426" text-anchor="middle" font-size="10" fill="#6B7280">已含全量</text>

  <line x1="225" y1="420" x2="395" y2="420" stroke="#EF4444" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <text x="310" y="412" text-anchor="middle" font-size="12" fill="#EF4444">⑥ 增量 buffer 原子追加到 temp</text>

  <!-- step 7: rename -->
  <line x1="475" y1="470" x2="770" y2="470" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="622" y="462" text-anchor="middle" font-size="12" fill="#111827">⑦ rename 原子替换：temp-rewrite.aof → appendonly.aof</text>

  <!-- ============ final file layout (hybrid) ============ -->
  <text x="460" y="510" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">最终文件（混合持久化）</text>

  <rect x="220" y="525" width="220" height="36" rx="4" fill="#EEF2FF" stroke="#4F46E5" stroke-width="2"/>
  <text x="330" y="548" text-anchor="middle" font-size="12" font-weight="700" fill="#4F46E5">RDB 全量快照（大头，加载快）</text>

  <rect x="440" y="525" width="240" height="36" rx="4" fill="#FEF2F7" stroke="#EF4444" stroke-width="2"/>
  <text x="560" y="548" text-anchor="middle" font-size="12" font-weight="700" fill="#EF4444">AOF 增量命令（尾部，少丢）</text>
</svg>
