<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 560" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-flow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="440" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图1-1　后端基础设施的三种核心范式与三家代言</text>

  <!-- ============ 第 1 行：三类核心能力 ============ -->
  <text x="40" y="74" font-size="13" font-weight="600" fill="#374151">后端基础能力（拆到最底层绕不开三类）</text>

  <!-- 能力 1：快速读写 -->
  <rect x="40" y="86" width="240" height="70" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="160" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">快速读写</text>
  <text x="160" y="132" text-anchor="middle" font-size="12.5" fill="#374151">缓存 · 计数 · 会话 · 锁</text>
  <text x="160" y="148" text-anchor="middle" font-size="12.5" fill="#374151">内存型</text>

  <!-- 能力 2：可靠存储 -->
  <rect x="320" y="86" width="240" height="70" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="440" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">可靠存储</text>
  <text x="440" y="132" text-anchor="middle" font-size="12.5" fill="#374151">事务 · 查询 · 持久化</text>
  <text x="440" y="148" text-anchor="middle" font-size="12.5" fill="#374151">持久化型</text>

  <!-- 能力 3：异步解耦与流转 -->
  <rect x="600" y="86" width="240" height="70" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="720" y="110" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">异步解耦与流转</text>
  <text x="720" y="132" text-anchor="middle" font-size="12.5" fill="#374151">消息 · 流 · 事件</text>
  <text x="720" y="148" text-anchor="middle" font-size="12.5" fill="#374151">流式型</text>

  <!-- 代言箭头（能力 → 软件） -->
  <text x="40" y="186" font-size="13" font-weight="600" fill="#374151">各自"代言人"</text>
  <line x1="160" y1="156" x2="160" y2="200" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="440" y1="156" x2="440" y2="200" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="156" x2="720" y2="200" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ 第 2 行：三家代言软件 ============ -->
  <!-- Redis -->
  <rect x="40" y="204" width="240" height="92" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.8"/>
  <text x="160" y="230" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">Redis</text>
  <text x="160" y="252" text-anchor="middle" font-size="12.5" fill="#374151">内存数据结构服务器</text>
  <text x="160" y="272" text-anchor="middle" font-size="12" fill="#4F46E5">在乎：低延迟 · 极简</text>
  <text x="160" y="288" text-anchor="middle" font-size="12" fill="#6B7280">不在乎：数据量、复杂计算</text>

  <!-- MySQL -->
  <rect x="320" y="204" width="240" height="92" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.8"/>
  <text x="440" y="230" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">MySQL</text>
  <text x="440" y="252" text-anchor="middle" font-size="12.5" fill="#374151">关系库（表/行 + SQL + 引擎）</text>
  <text x="440" y="272" text-anchor="middle" font-size="12" fill="#D97706">在乎：强一致 · 不丢不错</text>
  <text x="440" y="288" text-anchor="middle" font-size="12" fill="#6B7280">不在乎：极致写性能</text>

  <!-- Kafka -->
  <rect x="600" y="204" width="240" height="92" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.8"/>
  <text x="720" y="230" text-anchor="middle" font-size="16" font-weight="700" fill="#111827">Kafka</text>
  <text x="720" y="252" text-anchor="middle" font-size="12.5" fill="#374151">追加写日志的分布式流平台</text>
  <text x="720" y="272" text-anchor="middle" font-size="12" fill="#059669">在乎：吞吐 · 可扩展</text>
  <text x="720" y="288" text-anchor="middle" font-size="12" fill="#6B7280">不在乎：低延迟、灵活查询</text>

  <!-- 互补关系说明 -->
  <text x="40" y="328" font-size="13" font-weight="600" fill="#374151">三类能力互补而非替代 —— 一个真实系统会同时用到三者：</text>

  <!-- ============ 第 3 行：电商订单系统（三者协同） ============ -->
  <rect x="40" y="346" width="800" height="170" rx="8" fill="#FFFFFF" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="440" y="368" text-anchor="middle" font-size="13.5" font-weight="600" fill="#374151">真实场景：电商下单链路</text>

  <!-- 用户下单 -->
  <rect x="60" y="386" width="120" height="56" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="120" y="411" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">用户下单</text>
  <text x="120" y="430" text-anchor="middle" font-size="11.5" fill="#374151">读购物车 / 校验</text>

  <!-- Redis 购物车 -->
  <rect x="216" y="386" width="120" height="56" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="276" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="#4F46E5">Redis</text>
  <text x="276" y="430" text-anchor="middle" font-size="11.5" fill="#374151">购物车 / 库存计数缓存</text>

  <!-- MySQL 订单 -->
  <rect x="372" y="386" width="120" height="56" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="432" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="#D97706">MySQL</text>
  <text x="432" y="430" text-anchor="middle" font-size="11.5" fill="#374151">订单 / 账户落库（事务）</text>

  <!-- Kafka 事件 -->
  <rect x="528" y="386" width="120" height="56" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="588" y="408" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Kafka</text>
  <text x="588" y="430" text-anchor="middle" font-size="11.5" fill="#374151">发布"订单已创建"事件</text>

  <!-- 下游 -->
  <rect x="684" y="386" width="136" height="56" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="752" y="408" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">下游消费者</text>
  <text x="752" y="430" text-anchor="middle" font-size="11.5" fill="#374151">物流 / 积分 / 通知</text>

  <!-- 数据流箭头 -->
  <line x1="180" y1="414" x2="214" y2="414" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrow-flow)"/>
  <line x1="336" y1="414" x2="370" y2="414" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrow-flow)"/>
  <line x1="492" y1="414" x2="526" y2="414" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrow-flow)"/>
  <line x1="648" y1="414" x2="682" y2="414" stroke="#EF4444" stroke-width="1.8" marker-end="url(#arrow-flow)"/>

  <!-- 数据流标注 -->
  <text x="197" y="406" text-anchor="middle" font-size="10.5" fill="#EF4444">读</text>
  <text x="353" y="406" text-anchor="middle" font-size="10.5" fill="#EF4444">写</text>
  <text x="509" y="406" text-anchor="middle" font-size="10.5" fill="#EF4444">发布</text>
  <text x="665" y="406" text-anchor="middle" font-size="10.5" fill="#EF4444">消费</text>

  <!-- 底部结论 -->
  <text x="440" y="478" text-anchor="middle" font-size="12.5" fill="#374151">把这三家读懂，就等于掌握了后端架构的"基本粒子"</text>
  <text x="440" y="500" text-anchor="middle" font-size="12" font-style="italic" fill="#6B7280">（ Redis 管"快" · MySQL 管"对" · Kafka 管"多" ）</text>
</svg>
