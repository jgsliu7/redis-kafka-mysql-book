<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 5-4　Kafka 同一 Broker 的监听器分层</text>
  <text x="440" y="50" text-anchor="middle" font-size="12" fill="#374151">内部 SASL_SSL / 外部 SSL / 控制面 KRaft 三条路径并行，按网络域分级信任</text>

  <!-- Three sources (left column) -->
  <!-- 内部应用客户端 -->
  <rect x="30" y="95" width="150" height="56" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="105" y="118" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">内部应用客户端</text>
  <text x="105" y="136" text-anchor="middle" font-size="11" fill="#374151">受信内网 / VPC</text>

  <!-- 外部应用客户端 -->
  <rect x="30" y="265" width="150" height="56" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
  <text x="105" y="288" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">外部应用客户端</text>
  <text x="105" y="306" text-anchor="middle" font-size="11" fill="#374151">公网 / 跨云</text>

  <!-- Controller 节点 -->
  <rect x="30" y="435" width="150" height="56" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="105" y="458" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">Controller 节点</text>
  <text x="105" y="476" text-anchor="middle" font-size="11" fill="#374151">KRaft 控制面</text>

  <!-- Three listeners on the Broker (middle column) -->
  <!-- Broker container -->
  <rect x="290" y="80" width="320" height="420" rx="10" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="450" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">同一个 Broker 进程</text>
  <text x="450" y="121" text-anchor="middle" font-size="11" fill="#374151">listeners + listener.security.protocol.map</text>

  <!-- Listener 1: INTERNAL (SASL_SSL) -->
  <rect x="310" y="135" width="280" height="100" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="325" y="158" font-size="13" font-weight="700" fill="#111827">监听器 INTERNAL</text>
  <text x="325" y="178" font-size="12" fill="#374151">协议：SASL_SSL（强制认证 + 加密）</text>
  <text x="325" y="196" font-size="12" fill="#374151">端口 9092 · SASL=SCRAM-SHA-512</text>
  <text x="325" y="214" font-size="11" fill="#059669" font-weight="600">信任级别：高（内网互信证书）</text>
  <text x="325" y="228" font-size="11" fill="#374151">advertised.listeners=内网域名</text>

  <!-- Listener 2: EXTERNAL (SSL only / SASL_PLAINTEXT? here SSL) -->
  <rect x="310" y="305" width="280" height="100" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="325" y="328" font-size="13" font-weight="700" fill="#111827">监听器 EXTERNAL</text>
  <text x="325" y="348" font-size="12" fill="#374151">协议：SSL（加密 + 双向证书认证）</text>
  <text x="325" y="366" font-size="12" fill="#374151">端口 9093 · 公网 CA 签发证书</text>
  <text x="325" y="384" font-size="11" fill="#D97706" font-weight="600">信任级别：中（公网，证书强校验）</text>
  <text x="325" y="398" font-size="11" fill="#374151">advertised.listeners=公网域名</text>

  <!-- Listener 3: CONTROLLER (KRaft) -->
  <rect x="310" y="435" width="280" height="55" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.6"/>
  <text x="325" y="456" font-size="13" font-weight="700" fill="#111827">监听器 CONTROLLER</text>
  <text x="325" y="474" font-size="12" fill="#374151">协议：SSL · 端口 9094 · 元数据 Raft 复制</text>
  <text x="325" y="487" font-size="11" fill="#374151">信任级别：最高（节点互信，专网）</text>

  <!-- arrows: sources -> listeners -->
  <line x1="180" y1="123" x2="306" y2="160" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="180" y1="293" x2="306" y2="330" stroke="#D97706" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="180" y1="463" x2="306" y2="455" stroke="#4B5563" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Right column: inside broker security layers -->
  <!-- After listener: shared authz + audit core -->
  <rect x="650" y="135" width="200" height="355" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="750" y="160" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">共享安全内核</text>
  <line x1="670" y1="172" x2="830" y2="172" stroke="#059669" stroke-width="1"/>

  <!-- Authorizer -->
  <rect x="670" y="186" width="160" height="58" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.3"/>
  <text x="750" y="208" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">授权 Authorizer</text>
  <text x="750" y="226" text-anchor="middle" font-size="11" fill="#374151">Principal + Operation</text>
  <text x="750" y="240" text-anchor="middle" font-size="11" fill="#374151">+ Resource 三元组</text>

  <!-- ACL store -->
  <rect x="670" y="258" width="160" height="58" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.3"/>
  <text x="750" y="280" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">ACL 存储</text>
  <text x="750" y="298" text-anchor="middle" font-size="11" fill="#374151">KRaft 元数据日志</text>
  <text x="750" y="312" text-anchor="middle" font-size="11" fill="#374151">前缀授权 app-a.*</text>

  <!-- audit log -->
  <rect x="670" y="330" width="160" height="58" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.3"/>
  <text x="750" y="352" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">审计日志</text>
  <text x="750" y="370" text-anchor="middle" font-size="11" fill="#374151">Authorizer 决策</text>
  <text x="750" y="384" text-anchor="middle" font-size="11" fill="#374151">+ 请求拦截器</text>

  <!-- topic store -->
  <rect x="670" y="402" width="160" height="68" rx="6" fill="#FFFFFF" stroke="#059669" stroke-width="1.3"/>
  <text x="750" y="424" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">主题分区</text>
  <text x="750" y="442" text-anchor="middle" font-size="11" fill="#374151">日志段读写</text>
  <text x="750" y="458" text-anchor="middle" font-size="11" fill="#374151">副本同步（亦 TLS）</text>

  <!-- arrows from listeners into shared core -->
  <line x1="590" y1="185" x2="666" y2="215" stroke="#059669" stroke-width="1.6" marker-end="url(#arrow-green)"/>
  <line x1="590" y1="355" x2="666" y2="240" stroke="#D97706" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="590" y1="460" x2="666" y2="265" stroke="#4B5563" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Bottom note: design takeaway -->
  <rect x="30" y="515" width="820" height="52" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="440" y="535" text-anchor="middle" font-size="12" fill="#374151">设计要点：同一进程多监听器并存，每条路径独立配置协议、端口、证书与 advertised 域名 → 按网络域分级信任。</text>
  <text x="440" y="554" text-anchor="middle" font-size="12" fill="#374151">代价：配置矩阵复杂；但任何一段明文都是漏洞，故副本同步、控制面、客户端三跳都必须独立 TLS。</text>
</svg>
