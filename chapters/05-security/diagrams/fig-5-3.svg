<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 580" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 5-3　MySQL 五级权限表的层级收窄检查流程</text>
  <text x="440" y="50" text-anchor="middle" font-size="12" fill="#374151">授权检查从全局到列逐层收窄，命中即停；细粒度优先于粗粒度</text>

  <!-- Left column: 权限表层级 (stacked boxes) -->
  <!-- Level 1: 全局 mysql.user -->
  <rect x="60" y="85" width="240" height="56" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="80" y="108" font-size="14" font-weight="700" fill="#111827">① 全局</text>
  <text x="80" y="128" font-size="11" fill="#374151">mysql.user（账号+主机 → 全库通吃权限）</text>

  <line x1="180" y1="141" x2="180" y2="160" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="190" y="155" font-size="10" fill="#6B7280">未命中</text>

  <!-- Level 2: 数据库 mysql.db -->
  <rect x="60" y="163" width="240" height="56" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="80" y="186" font-size="14" font-weight="700" fill="#111827">② 数据库</text>
  <text x="80" y="206" font-size="11" fill="#374151">mysql.db（账号+主机+库 → 单库权限）</text>

  <line x1="180" y1="219" x2="180" y2="238" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="190" y="233" font-size="10" fill="#6B7280">未命中</text>

  <!-- Level 3: 表 mysql.tables_priv -->
  <rect x="60" y="241" width="240" height="56" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="80" y="264" font-size="14" font-weight="700" fill="#111827">③ 表</text>
  <text x="80" y="284" font-size="11" fill="#374151">mysql.tables_priv（账号+库+表 → 单表权限）</text>

  <line x1="180" y1="297" x2="180" y2="316" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="190" y="311" font-size="10" fill="#6B7280">未命中</text>

  <!-- Level 4: 列 mysql.columns_priv -->
  <rect x="60" y="319" width="240" height="56" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="80" y="342" font-size="14" font-weight="700" fill="#111827">④ 列</text>
  <text x="80" y="362" font-size="11" fill="#374151">mysql.columns_priv（账号+库+表+列 → 列级）</text>

  <line x1="180" y1="375" x2="180" y2="394" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="190" y="389" font-size="10" fill="#6B7280">未命中</text>

  <!-- Level 5: 存储程序 -->
  <rect x="60" y="397" width="240" height="56" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="80" y="420" font-size="14" font-weight="700" fill="#111827">⑤ 存储程序</text>
  <text x="80" y="440" font-size="11" fill="#374151">mysql.procs_priv（例程级 EXECUTE/ALTER）</text>

  <!-- funnel label -->
  <text x="300" y="276" font-size="11" fill="#D97706" font-style="italic">作用域</text>
  <text x="300" y="292" font-size="11" fill="#D97706" font-style="italic">逐层收窄</text>
  <line x1="300" y1="300" x2="300" y2="320" stroke="#D97706" stroke-width="1" stroke-dasharray="3 3"/>
  <polygon points="296,318 304,318 300,326" fill="#D97706"/>
  <text x="310" y="330" font-size="11" fill="#D97706" font-style="italic">粒度变细</text>

  <!-- Right column: 检查决策路径 -->
  <!-- Start: 用户执行 SELECT phone FROM users -->
  <rect x="430" y="85" width="380" height="50" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.5"/>
  <text x="620" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#111827">示例：SELECT phone FROM db.users</text>
  <text x="620" y="125" text-anchor="middle" font-size="11" fill="#374151">alice@%.example.com 要查 db.users 的 phone 列</text>

  <!-- Step 1: 查全局 -->
  <rect x="430" y="155" width="380" height="48" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="445" y="176" font-size="12" font-weight="600" fill="#111827">查 mysql.user：alice@%.example.com 是否有全局 SELECT？</text>
  <text x="445" y="194" font-size="11" fill="#EF4444">否（无全局权限）→ 继续下钻</text>

  <!-- Step 2: 查库 -->
  <rect x="430" y="215" width="380" height="48" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="445" y="236" font-size="12" font-weight="600" fill="#111827">查 mysql.db：alice 对 db 是否有 SELECT？</text>
  <text x="445" y="254" font-size="11" fill="#EF4444">否（未在 db 级授权）→ 继续下钻</text>

  <!-- Step 3: 查表 -->
  <rect x="430" y="275" width="380" height="48" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="445" y="296" font-size="12" font-weight="600" fill="#111827">查 mysql.tables_priv：alice 对 db.users 是否有 SELECT？</text>
  <text x="445" y="314" font-size="11" fill="#EF4444">否（表级只授了 INSERT）→ 继续下钻</text>

  <!-- Step 4: 查列 (命中) -->
  <rect x="430" y="335" width="380" height="48" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="445" y="356" font-size="12" font-weight="600" fill="#111827">查 mysql.columns_priv：alice 对 phone 列是否有 SELECT？</text>
  <text x="445" y="374" font-size="11" fill="#059669" font-weight="600">是（列级授权命中）→ 停止，返回结果</text>

  <!-- Result -->
  <line x1="620" y1="383" x2="620" y2="408" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="470" y="412" width="300" height="42" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="620" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#065F46">放行：返回 phone 列值</text>
  <text x="620" y="446" text-anchor="middle" font-size="11" fill="#374151">（其余列即使表级无权，列级命中也允许）</text>

  <!-- connector arrows between right steps -->
  <line x1="620" y1="135" x2="620" y2="153" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="620" y1="203" x2="620" y2="213" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="620" y1="263" x2="620" y2="273" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="620" y1="323" x2="620" y2="333" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- bottom note: 缓存优化 -->
  <rect x="60" y="478" width="760" height="80" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="80" y="500" font-size="12" font-weight="600" fill="#111827">命中即停：检查到任一层授予权限就停止下钻，避免无谓穿透。</text>
  <text x="80" y="520" font-size="12" fill="#374151">性能取舍：层级越细检查越慢，MySQL 把"账号+库表"的检查结果缓存在内存（权限 bitmap），命中即 O(1)。</text>
  <text x="80" y="540" font-size="12" fill="#374151">8.0 增量：RBAC 角色 = 一组权限的命名集合，会话内 <tspan font-weight="600" fill="#111827">SET ROLE</tspan> 激活后并入同一套层级检查。</text>
</svg>
