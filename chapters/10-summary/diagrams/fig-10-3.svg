<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
  </defs>

  <!-- 标题 -->
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">图 10-3　认知跃迁的四层台阶</text>
  <text x="450" y="53" text-anchor="middle" font-size="13" fill="#6B7280">从使用者到设计者，跨越的不是知识量，而是看问题的坐标系</text>

  <!-- 台阶：从下到上 L1 → L4，宽度递增、高度递增、左对齐基线相同 -->
  <!-- L1 -->
  <rect x="80" y="410" width="170" height="80" rx="6" fill="#F3F4F6" stroke="#6B7280" stroke-width="1.6"/>
  <text x="165" y="438" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">L1 · 使用者</text>
  <text x="165" y="458" text-anchor="middle" font-size="11.5" fill="#374151">会配置、会调优</text>
  <text x="165" y="476" text-anchor="middle" font-size="11" fill="#6B7280">"怎么用 Redis / SQL"</text>

  <!-- L2 -->
  <rect x="270" y="330" width="180" height="80" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.6"/>
  <text x="360" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">L2 · 理解者</text>
  <text x="360" y="378" text-anchor="middle" font-size="11.5" fill="#374151">懂内部机制</text>
  <text x="360" y="396" text-anchor="middle" font-size="11" fill="#6B7280">"为什么这么设计"</text>

  <!-- L3 -->
  <rect x="470" y="250" width="190" height="80" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.6"/>
  <text x="565" y="278" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">L3 · 设计者</text>
  <text x="565" y="298" text-anchor="middle" font-size="11.5" fill="#374151">能借鉴思想造系统</text>
  <text x="565" y="316" text-anchor="middle" font-size="11" fill="#6B7280">抽象 + 权衡 + 直觉</text>

  <!-- L4 -->
  <rect x="680" y="170" width="180" height="80" rx="6" fill="#ECFDF5" stroke="#059669" stroke-width="1.6"/>
  <text x="770" y="198" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">L4 · 创新者</text>
  <text x="770" y="218" text-anchor="middle" font-size="11.5" fill="#374151">创造新架构模式</text>
  <text x="770" y="236" text-anchor="middle" font-size="11" fill="#6B7280">定义新的范式</text>

  <!-- 台阶水平连接（顶面），表达"拾级而上" -->
  <line x1="250" y1="410" x2="270" y2="410" stroke="#4B5563" stroke-width="1.2"/>
  <line x1="450" y1="330" x2="470" y2="330" stroke="#4B5563" stroke-width="1.2"/>
  <line x1="660" y1="250" x2="680" y2="250" stroke="#4B5563" stroke-width="1.2"/>

  <!-- 向上跃迁的主箭头（红色，沿台阶斜向上） -->
  <path d="M 165 410 Q 280 370 360 330 Q 480 290 565 250 Q 680 215 770 170" fill="none" stroke="#EF4444" stroke-width="1.8" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="465" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#EF4444">认知跃迁方向（坐标系变换）</text>

  <!-- ============ 本书 8 章 / 本章对应标注 ============ -->
  <!-- 本书前 8 章：L1 → L2 -->
  <line x1="360" y1="418" x2="360" y2="408" stroke="#4F46E5" stroke-width="0" />
  <rect x="245" y="498" width="230" height="36" rx="6" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="360" y="515" text-anchor="middle" font-size="11.5" font-weight="600" fill="#4F46E5">本书第 1–8 章</text>
  <text x="360" y="529" text-anchor="middle" font-size="11" fill="#374151">带读者完成 L1 → L2 的跃迁</text>
  <!-- 连线指到 L1/L2 之间 -->
  <line x1="360" y1="498" x2="360" y2="490" stroke="#4F46E5" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <!-- 本章：L2 → L3 -->
  <rect x="540" y="498" width="190" height="36" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="635" y="515" text-anchor="middle" font-size="11.5" font-weight="600" fill="#D97706">第 10 章（本章）</text>
  <text x="635" y="529" text-anchor="middle" font-size="11" fill="#374151">推动 L2 → L3 的跃迁</text>
  <line x1="610" y1="498" x2="580" y2="335" stroke="#D97706" stroke-width="1.2" marker-end="url(#arrowGray)"/>

  <!-- ============ L3 核心能力 ============ -->
  <rect x="80" y="112" width="560" height="62" rx="6" fill="#FAFAFA" stroke="#E5E7EB" stroke-width="1"/>
  <text x="90" y="132" font-size="12" font-weight="700" fill="#111827">L3 设计者的三项核心能力：</text>
  <text x="90" y="150" font-size="11.5" fill="#374151">① 抽象：看见 B+树/跳表/稀疏索引背后的"索引"本质</text>
  <text x="90" y="168" font-size="11.5" fill="#374151">② 权衡：理解每个选项的机会成本　　③ 直觉：快速识别瓶颈、预判规模放大后的表现</text>

  <!-- 箴言收束 -->
  <rect x="660" y="118" width="200" height="38" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="760" y="135" text-anchor="middle" font-size="11.5" font-weight="700" fill="#111827">箴言</text>
  <text x="760" y="151" text-anchor="middle" font-size="11" fill="#374151">看问题的坐标系</text>

  <!-- 底注 -->
  <text x="450" y="548" text-anchor="middle" font-size="11" fill="#9CA3AF">读图：四层不是职称阶梯，而是"看问题的坐标系"逐层升级；L3 是分水岭，从回答"是什么"转到回答"为什么/换我怎么做"。</text>
</svg>
