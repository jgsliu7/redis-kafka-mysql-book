<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4B5563"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4F46E5"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#111827">图 8-8 Kafka Tiered Storage 日志段生命周期</text>

  <!-- Phase labels -->
  <text x="160" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#4F46E5">① 本地热段</text>
  <text x="440" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#4F46E5">② 段关闭 → 异步上传</text>
  <text x="720" y="70" text-anchor="middle" font-size="13" font-weight="600" fill="#4F46E5">③ 远程存储 + 本地可选</text>

  <!-- ===== Phase 1: Local hot segments ===== -->
  <rect x="40" y="90" width="240" height="100" rx="8" fill="#EEF2FF" stroke="#4F46E5" stroke-width="1.5"/>
  <text x="160" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#4F46E5">Kafka Broker 本地磁盘</text>
  <rect x="60" y="125" width="60" height="30" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="90" y="145" text-anchor="middle" font-size="11" fill="#374151">.log</text>
  <rect x="125" y="125" width="60" height="30" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="155" y="145" text-anchor="middle" font-size="11" fill="#374151">.index</text>
  <rect x="190" y="125" width="60" height="30" rx="4" fill="#DBEAFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="220" y="145" text-anchor="middle" font-size="11" fill="#374151">.timeindex</text>
  <text x="160" y="178" text-anchor="middle" font-size="11" fill="#6B7280">活跃段：正在追加写入</text>

  <!-- Arrow 1->2 -->
  <line x1="280" y1="140" x2="330" y2="140" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="305" y="130" text-anchor="middle" font-size="10" fill="#6B7280">关闭</text>

  <!-- ===== Phase 2: Upload ===== -->
  <rect x="340" y="90" width="200" height="100" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="440" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">RemoteStorageManager</text>
  <text x="440" y="140" text-anchor="middle" font-size="12" fill="#374151">异步上传 S3/GCS/Azure</text>
  <text x="440" y="160" text-anchor="middle" font-size="11" fill="#6B7280">格式不变 · 三件套原样传输</text>
  <text x="440" y="180" text-anchor="middle" font-size="11" fill="#6B7280">本地可保留可丢弃</text>

  <!-- Arrow 2->3 -->
  <line x1="540" y1="140" x2="590" y2="140" stroke="#4B5563" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ===== Phase 3: Remote storage ===== -->
  <rect x="600" y="90" width="250" height="100" rx="8" fill="#ECFDF5" stroke="#10B981" stroke-width="1.5"/>
  <text x="725" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#065F46">对象存储（S3 / GCS / Blob）</text>
  <rect x="620" y="125" width="60" height="30" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="650" y="145" text-anchor="middle" font-size="11" fill="#374151">.log</text>
  <rect x="685" y="125" width="60" height="30" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="715" y="145" text-anchor="middle" font-size="11" fill="#374151">.index</text>
  <rect x="750" y="125" width="60" height="30" rx="4" fill="#D1FAE5" stroke="#6EE7B7" stroke-width="1"/>
  <text x="780" y="145" text-anchor="middle" font-size="11" fill="#374151">.timeindex</text>
  <text x="725" y="178" text-anchor="middle" font-size="11" fill="#6B7280">冷段：低频访问</text>

  <!-- ===== Read path (bottom) ===== -->
  <rect x="40" y="250" width="810" height="32" rx="6" fill="#F3F4F6" stroke="#D1D5DB" stroke-width="1"/>
  <text x="445" y="271" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">读取路径：消费者 / Follower 请求 → 先查本地 → 未命中则回源远程（fetch-through） → 缓存到本地</text>

  <!-- Arrow from read path to local -->
  <line x1="120" y1="250" x2="120" y2="195" stroke="#4F46E5" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <text x="95" y="225" text-anchor="middle" font-size="10" fill="#4F46E5">本地命中</text>

  <!-- Arrow from read path to remote -->
  <line x1="700" y1="250" x2="700" y2="195" stroke="#10B981" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="670" y="225" text-anchor="middle" font-size="10" fill="#10B981">远程回源</text>

  <!-- ===== Key insight box ===== -->
  <rect x="40" y="310" width="810" height="90" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="445" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#92400E">核心洞察</text>
  <text x="445" y="360" text-anchor="middle" font-size="12" fill="#374151">存储格式与存储介质解耦，同一套 .log/.index/.timeindex 文件结构，在本地磁盘和远程对象存储之间无缝迁移</text>
  <text x="445" y="380" text-anchor="middle" font-size="12" fill="#374151">Log 抽象封装了"数据在哪"，上层 API 层和复制层完全无感</text>
  <text x="445" y="396" text-anchor="middle" font-size="11" fill="#6B7280">冷数据延迟：毫秒级（磁盘/PageCache）→ 数十毫秒级（对象存储 GET）</text>
</svg>
